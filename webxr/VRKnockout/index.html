<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VR Knockout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fall Guys–style uphill race in VR: gravity, rolling hazards, finish line. Up to eight players online."
    />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="vk-game-menu.js"></script>
    <script src="vrknockout.js"></script>
  </head>
  <body>
    <!-- Pre-VR nickname overlay -->
    <div
      id="pre-vr-overlay"
      style="
        position: fixed;
        inset: 0;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
      "
    >
      <div style="text-align: center">
        <h1 style="font-size: 2.5em; margin-bottom: 0.2em; letter-spacing: 0.1em">VR KNOCKOUT</h1>
        <p style="color: #888; margin-bottom: 1.5em; max-width: 26em; margin-left: auto; margin-right: auto; line-height: 1.45">
          Race to the finish in VR—three courses, up to eight players.
        </p>
        <label for="nickname-input" style="display: block; margin-bottom: 0.4em; font-size: 1.1em">Nickname</label>
        <input
          id="nickname-input"
          type="text"
          maxlength="12"
          placeholder="Player"
          style="
            font-size: 1.2em;
            padding: 0.4em 0.8em;
            border: 2px solid #4488ff;
            border-radius: 6px;
            background: #222;
            color: white;
            text-align: center;
            width: 200px;
            outline: none;
          "
        />
        <p style="font-size: 0.8em; color: #666; margin-top: 1.5em">Press <b>Enter VR</b> below to start</p>
      </div>
    </div>
    <script>
      (function () {
        var input = document.getElementById('nickname-input');
        var saved = localStorage.getItem('vrknockout-nickname');
        if (saved && input) input.value = saved;
        if (input) {
          input.addEventListener('input', function () {
            localStorage.setItem('vrknockout-nickname', this.value);
            window.playerNickname = this.value || 'Player';
          });
        }
        window.playerNickname = (saved && saved.trim()) || (input && input.value.trim()) || 'Player';
      })();
      (function () {
        try {
          var r = localStorage.getItem('vrknockout-auto-stabilize');
          if (r === null || r === '') {
            window._vlAutoRollEnabled = localStorage.getItem('vrknockout-auto-yaw') !== '0';
          } else {
            window._vlAutoRollEnabled = r !== '0';
          }
        } catch (e) {
          window._vlAutoRollEnabled = true;
        }
      })();
    </script>

    <div
      id="vk-score"
      style="
        position: fixed;
        right: 10px;
        top: 10px;
        z-index: 5;
        font: 600 13px system-ui, sans-serif;
        color: #ffb3d9;
        pointer-events: none;
        text-shadow: 0 0 6px #000;
      "
    >
      Qualified 0/8 | --:--
    </div>
    <div
      id="vk-status"
      style="
        position: fixed;
        left: 10px;
        bottom: 10px;
        max-width: 420px;
        z-index: 5;
        font: 12px system-ui, sans-serif;
        color: #fc8;
        pointer-events: none;
        text-shadow: 0 0 6px #000;
        line-height: 1.4;
      "
    ></div>

                        value="X"
                        align="center"
                        anchor="center"

                      side="double"
