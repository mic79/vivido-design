                <a-text value="Lobby:" position="-0.22 0 0" align="left" width="0.35" color="#cccccc"></a-text>
                <a-entity id="menu-lobby-minus" class="clickable" menu-click position="-0.02 0 0"
                          geometry="primitive: box; width: 0.05; height: 0.05; depth: 0.005"
                          material="color: #555555; shader: flat">
                  <a-text value="-" align="center" width="0.4" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-text id="menu-lobby-number" value="1" position="0.06 0 0" align="center" width="0.4" color="#ffffff"></a-text>
                <a-entity id="menu-lobby-plus" class="clickable" menu-click position="0.14 0 0"
                          geometry="primitive: box; width: 0.05; height: 0.05; depth: 0.005"
                          material="color: #555555; shader: flat">
                  <a-text value="+" align="center" width="0.4" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-entity id="menu-join" class="clickable" menu-click position="0.26 0 0"
                          geometry="primitive: box; width: 0.12; height: 0.05; depth: 0.005"
                          material="color: #22aa44; shader: flat">
                  <a-text value="JOIN" align="center" width="0.35" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>

                <!-- Connected players list -->
                <a-text id="menu-players-list" value="Players: -" position="-0.3 -0.06 0" align="left" width="0.3" color="#aaaaaa"></a-text>

                <!-- Queue status -->
                <a-text id="menu-queue-status" value="" position="-0.3 -0.12 0" align="left" width="0.3" color="#ffcc00"></a-text>
              </a-entity>

              <!-- Queue buttons -->
              <a-entity id="menu-queue-buttons" visible="false" position="0 -0.1 0">
                <a-entity id="menu-join-queue" class="clickable" menu-click position="-0.1 0 0"
                          geometry="primitive: box; width: 0.18; height: 0.05; depth: 0.005"
                          material="color: #22aa44; shader: flat">
                  <a-text value="JOIN QUEUE" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-entity id="menu-leave-queue" class="clickable" menu-click position="0.1 0 0" visible="false"
                          geometry="primitive: box; width: 0.18; height: 0.05; depth: 0.005"
                          material="color: #cc3333; shader: flat">
                  <a-text value="LEAVE QUEUE" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
              </a-entity>

              <!-- Bot mode toggle (singleplayer only) -->
              <a-entity id="menu-mirror-section" position="0 0.02 0">
                <a-text value="Bot Mode:" position="-0.22 0 0" align="left" width="0.35" color="#cccccc"></a-text>
                <a-entity id="menu-mirror-toggle" class="clickable" menu-click position="0.1 0 0"
                          geometry="primitive: box; width: 0.24; height: 0.05; depth: 0.005"
                          material="color: #555555; opacity: 0.9; shader: flat">
                  <a-text id="menu-mirror-text" value="NORMAL" align="center" width="0.35" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-text id="menu-clip-count" value="" position="0.1 -0.035 0" align="center" width="0.3" color="#88cc88" visible="false"></a-text>
                <a-entity id="menu-clip-buttons" position="0.1 -0.075 0" visible="false">
                  <a-entity id="menu-delete-last" class="clickable" menu-click position="-0.08 0 0"
                            geometry="primitive: box; width: 0.14; height: 0.04; depth: 0.005"
                            material="color: #cc6600; opacity: 0.9; shader: flat">
                    <a-text value="DEL LAST" align="center" width="0.28" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                  <a-entity id="menu-clear-clips" class="clickable" menu-click position="0.08 0 0"
                            geometry="primitive: box; width: 0.14; height: 0.04; depth: 0.005"
                            material="color: #cc3333; opacity: 0.9; shader: flat">
                    <a-text value="CLEAR ALL" align="center" width="0.28" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                </a-entity>

                <!-- Recorded sub-mode section (visible in RECORDED mode with clips) -->
                <a-entity id="menu-rec-sub-section" position="0 -0.07 0" visible="false">
                  <a-text value="Mode:" position="-0.12 0 0" align="left" width="0.3" color="#cccccc"></a-text>
                  <a-entity id="menu-rec-mode-toggle" class="clickable" menu-click position="0.12 0 0"
                            geometry="primitive: box; width: 0.2; height: 0.04; depth: 0.005"
                            material="color: #555555; opacity: 0.9; shader: flat">
                    <a-text id="menu-rec-mode-text" value="ALL RANDOM" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>

                  <a-entity id="menu-difficulty-row" position="0 -0.045 0">
                    <a-text value="Difficulty:" position="-0.12 0 0" align="left" width="0.28" color="#cccccc"></a-text>
                    <a-entity id="menu-difficulty-toggle" class="clickable" menu-click position="0.12 0 0"
                              geometry="primitive: box; width: 0.2; height: 0.04; depth: 0.005"
                              material="color: #555555; opacity: 0.9; shader: flat">
                      <a-text id="menu-difficulty-text" value="MEDIUM" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                    </a-entity>
                  </a-entity>

                  <!-- Browse controls (visible in SINGLE sub-mode) -->
                  <a-entity id="menu-single-browse" position="0 -0.045 0" visible="false">
                    <a-entity id="menu-clip-prev" class="clickable" menu-click position="-0.12 0 0"
                              geometry="primitive: box; width: 0.06; height: 0.035; depth: 0.005"
                              material="color: #555555; opacity: 0.9; shader: flat">
                      <a-text value="<" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                    </a-entity>
                    <a-text id="menu-clip-counter" value="0 / 0" position="-0.04 0 0" align="center" width="0.28" color="#ffffff"></a-text>
                    <a-entity id="menu-clip-next" class="clickable" menu-click position="0.04 0 0"
                              geometry="primitive: box; width: 0.06; height: 0.035; depth: 0.005"
                              material="color: #555555; opacity: 0.9; shader: flat">
                      <a-text value=">" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                    </a-entity>
                    <a-entity id="menu-clip-delete" class="clickable" menu-click position="0.16 0 0"
                              geometry="primitive: box; width: 0.1; height: 0.035; depth: 0.005"
                              material="color: #cc3333; opacity: 0.9; shader: flat">
                      <a-text value="DEL" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                    </a-entity>
                  </a-entity>
                </a-entity>
              </a-entity>

              <!-- Stats section (stats tab only) -->
              <a-entity id="menu-stats-section" visible="false" position="0 -0.02 0">
                <!-- Sub-tab row -->
                <a-entity position="0 0.06 0">
                  <a-entity id="menu-stats-sp" class="clickable" menu-click position="-0.12 0 0"
                            geometry="primitive: box; width: 0.2; height: 0.045; depth: 0.005"
                            material="color: #4488ff; opacity: 0.9; shader: flat">
                    <a-text value="SP HISTORY" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                  <a-entity id="menu-stats-mp" class="clickable" menu-click position="0.12 0 0"
                            geometry="primitive: box; width: 0.2; height: 0.045; depth: 0.005"
                            material="color: #333333; opacity: 0.9; shader: flat">
                    <a-text value="MP HISTORY" align="center" width="0.3" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                </a-entity>
                <!-- Summary line -->
                <a-text id="menu-stats-summary" value="No matches yet" position="-0.3 0.025 0" align="left" width="0.32" color="#ffcc00"></a-text>
                <!-- Match history text block -->
                <a-text id="menu-stats-text" value="" position="-0.3 -0.01 0" align="left" width="0.28" color="#cccccc"
                        baseline="top" anchor="left"></a-text>
                <!-- Navigation + clear row -->
                <a-entity position="0 -0.2 0">
                  <a-entity id="menu-stats-prev" class="clickable" menu-click position="-0.2 0 0"
                            geometry="primitive: box; width: 0.12; height: 0.04; depth: 0.005"
                            material="color: #555555; opacity: 0.9; shader: flat">
                    <a-text value="< PREV" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                  <a-text id="menu-stats-page" value="" position="0 0 0" align="center" width="0.25" color="#888888"></a-text>
                  <a-entity id="menu-stats-next" class="clickable" menu-click position="0.2 0 0"
                            geometry="primitive: box; width: 0.12; height: 0.04; depth: 0.005"
                            material="color: #555555; opacity: 0.9; shader: flat">
                    <a-text value="NEXT >" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                  </a-entity>
                </a-entity>
                <!-- Per-match replay buttons (3 slots, dynamically shown/hidden) -->
                <a-entity id="menu-stats-replay-0" class="clickable" menu-click position="0.24 -0.028 0" visible="false"
                          geometry="primitive: box; width: 0.14; height: 0.025; depth: 0.005"
                          material="color: #4488ff; opacity: 0.9; shader: flat">
                  <a-text id="menu-stats-replay-0-text" value="Watch replay" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-entity id="menu-stats-replay-1" class="clickable" menu-click position="0.24 -0.076 0" visible="false"
                          geometry="primitive: box; width: 0.14; height: 0.025; depth: 0.005"
                          material="color: #4488ff; opacity: 0.9; shader: flat">
                  <a-text id="menu-stats-replay-1-text" value="Watch replay" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <a-entity id="menu-stats-replay-2" class="clickable" menu-click position="0.24 -0.124 0" visible="false"
                          geometry="primitive: box; width: 0.14; height: 0.025; depth: 0.005"
                          material="color: #4488ff; opacity: 0.9; shader: flat">
                  <a-text id="menu-stats-replay-2-text" value="Watch replay" align="center" width="0.24" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
                <!-- Clear button -->
                <a-entity id="menu-stats-clear" class="clickable" menu-click position="0 -0.24 0"
                          geometry="primitive: box; width: 0.18; height: 0.04; depth: 0.005"
                          material="color: #cc3333; opacity: 0.9; shader: flat">
                  <a-text value="CLEAR HISTORY" align="center" width="0.28" color="#ffffff" position="0 0 0.004"></a-text>
                </a-entity>
              </a-entity>

              <!-- Start / End match button -->
              <a-entity id="menu-start-match" class="clickable" menu-click position="0 -0.19 0"
                        geometry="primitive: box; width: 0.28; height: 0.06; depth: 0.005"
                        material="color: #ff8800; shader: flat">
                <a-text id="menu-start-match-text" value="START MATCH" align="center" width="0.4" color="#ffffff" position="0 0 0.004"></a-text>
              </a-entity>

              <!-- Close hint -->
              <a-text value="X to close" position="0 -0.25 0" align="center" width="0.25" color="#666666"></a-text>
            </a-entity>
          </a-entity>
          
          <a-entity id="leftHand" 
                   hand-controls="hand: left"
                   oculus-touch-controls="hand: left"
                   laser-controls="hand: left"
                   raycaster="objects: .clickable; far: 10; enabled: false; lineColor: #ffffff; lineOpacity: 0"
                   hand-collider
                   hand-haptics
                   debug-controller
                   custom-hand-controls
                   >
            <!-- Racket for left hand -->
            <a-box id="leftHandRacket"
                   width="0.2" 
                   height="0.2" 
                   depth="0.02"
                   position="0 0 -0.15"
                   rotation="0 -90 0"
                   material="color: #0099ff; emissive: #0099ff; emissiveIntensity: 1.5; wireframe: true; opacity: 0.8; transparent: true"
                   static-physics="isRacket: true"
                   visible="false">
            </a-box>
            
            <!-- Stats display on arm/wrist -->
            <a-entity id="arm-stats" 
                      position="0 0.1 0.05" 
                      rotation="-45 0 0">
              <!-- Background panel -->
              <a-plane width="0.32" 
                       height="0.25" 
                       color="#000000" 
                       material="opacity: 0.8; transparent: true"
                       position="0 0 -0.001">
              </a-plane>
              
              <!-- Stats text -->
              <a-text id="ball-stats-text"
                      value="Blue: -- m/s (Max: --)&#10;Stage 1  |  T:0 R:0 B:0 D:0 Acc:0%&#10;Red: -- m/s (Max: --)&#10;Stage 1  |  T:0 R:0 B:0 D:0 Acc:0%"
                      position="0 0 0"
                      align="center"
                      width="0.25"
                      color="#00ff00"
                      font="dejavu"
                      geometry="primitive: plane; width: auto; height: auto"
                      material="color: #000000; transparent: true; opacity: 0">
              </a-text>
            </a-entity>
          </a-entity>
          
          <a-entity id="rightHand" 
                   hand-controls="hand: right"
                   oculus-touch-controls="hand: right"
                   laser-controls="hand: right"
                   raycaster="objects: .clickable; far: 10; enabled: false; lineColor: #ffffff; lineOpacity: 0"
                   hand-collider
                   hand-haptics
                   debug-controller
                   custom-hand-controls
                   >
            <!-- Racket for right hand -->
            <a-box id="rightHandRacket"
                   width="0.2" 
                   height="0.2" 
                   depth="0.02"
                   position="0 0 -0.15"
                   rotation="0 -90 0"
                   material="color: #0099ff; emissive: #0099ff; emissiveIntensity: 1.5; wireframe: true; opacity: 0.8; transparent: true"
                   static-physics="isRacket: true"
                   visible="false">
            </a-box>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Player Body (rigged upper body) -->
      <a-entity id="player-body" mixamo-body="mode: player; color: #4A90E2"></a-entity>

      <a-sky color="#000000"></a-sky>
    </a-scene>
  </body>
</html>
