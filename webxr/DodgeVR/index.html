        if (connectionState === 'connecting') return;
        connectionState = 'connecting';
        window.connectionState = 'connecting';
        updateMultiplayerStatus('Connecting to lobby ' + lobbyNum + '...');
        multiplayerSlot = lobbyNum;

        const hostId = 'dodgevr-host-' + lobbyNum;
        const hostTaken = !(await checkPeerAvailability(hostId));

        if (hostTaken) {
          await setupPeer(lobbyNum);
        } else {
          await setupHost(lobbyNum);
        }
      }
      window.connectToLobby = connectToLobby;

      // --- Mobile Spectator Connection ---
      var _mobileSpectatorLobbyNum = 0;
      async function connectAsMobileSpectator(lobbyNum) {
        _mobileSpectatorLobbyNum = lobbyNum;
        if (isMultiplayer) return;
        var statusEl = document.getElementById('mobile-status-msg');
        var watchBtn = document.getElementById('mobile-watch-btn');
        if (statusEl) statusEl.textContent = 'Connecting to lobby ' + lobbyNum + '...';
        if (watchBtn) watchBtn.disabled = true;

        var hostId = 'dodgevr-host-' + lobbyNum;
        var hudStatusEl = document.getElementById('mobile-hud-status');
        var hostTaken = !(await checkPeerAvailability(hostId));

        if (!hostTaken) {
          if (statusEl) statusEl.textContent = 'No lobby found. Host must create it in VR first.';
          if (hudStatusEl) hudStatusEl.textContent = 'Host disconnected.';
          if (watchBtn) watchBtn.disabled = false;
          return;
        }

        cleanupMultiplayer();
        var peerIdNum = Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
        sessionID = 'dodgevr-mspec-' + peerIdNum;
        myPlayerId = sessionID;

        var iceServersConfig = await getIceServers();
        peer = new Peer(sessionID, {
          host: '0.peerjs.com', port: 443, secure: true,
          config: { iceServers: iceServersConfig }
        });
        peer.on('open', function () {
          if (statusEl) statusEl.textContent = 'Connecting to host...';
          conn = peer.connect(hostId);
          conn.on('open', function () {
            isMultiplayer = true;
            isHost = false;
            window.isMobileSpectator = true;
            window.isSpectator = true;
            syncWindowState();
            conn.send({ type: 'mobile-spectator', nickname: 'Spectator' });
            setupMobileSpectatorHandlers(conn);
            connectionState = 'connected';
            window.connectionState = 'connected';
            window._spectatorHostId = hostId;
            var _hudSt = document.getElementById('mobile-hud-status');
            if (_hudSt) _hudSt.textContent = 'Watching lobby ' + _mobileSpectatorLobbyNum;

            // Prevent screen from sleeping while spectating
            if ('wakeLock' in navigator && !window._wakeLockSetup) {
              window._wakeLockSetup = true;
              navigator.wakeLock.request('screen').then(function(lock) {
                window._wakeLock = lock;
                lock.addEventListener('release', function() { window._wakeLock = null; });
              }).catch(function() {});
              document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && !window._wakeLock) {
                  navigator.wakeLock.request('screen').then(function(lock) {
                    window._wakeLock = lock;
                    lock.addEventListener('release', function() { window._wakeLock = null; });
                  }).catch(function() {});
                }
              });
            }

            // Switch from lobby screen to match HUD
            var lobbyScreen = document.getElementById('mobile-lobby-screen');
            var matchHud = document.getElementById('mobile-match-hud');
            if (lobbyScreen) lobbyScreen.style.display = 'none';
            if (matchHud) matchHud.classList.add('active');
          });
          conn.on('error', function () {
            if (statusEl) statusEl.textContent = 'Connection failed.';
            if (watchBtn) watchBtn.disabled = false;
          });
        });
        peer.on('error', function (err) {
          if (statusEl) statusEl.textContent = 'Error: ' + err.type;
          if (watchBtn) watchBtn.disabled = false;
        });
      }
      window.connectAsMobileSpectator = connectAsMobileSpectator;

      function setupMobileSpectatorHandlers(hostConn) {
        hostConn.on('data', function (data) {
          if (data.type === 'lobby-state') {
            lobbyState = data.state;
            syncWindowState();
            var mp = lobbyState.matchPlayers;
            if (mp && lobbyState.matchState === 'PLAYING' && mp.blue && mp.red) {
              if (!spectatorMatchActive) {
                activateSpectatorView(mp, lobbyState.matchStartTime);
              }
              updateMobileHudNames();
            }
            updateMobileHudStatus();
          } else if (data.type === 'match-started') {
            window._lastArenaBotState = null;
            onMatchStarted(data);
            updateMobileHudNames();
            updateMobileHudStatus();
          } else if (data.type === 'match-ended') {
            window._lastArenaBotState = null;
            window._replayTimerText = null;
            window._replayNames = null;
            var _mhtEnd = document.getElementById('mobile-hud-timer');
            if (_mhtEnd) _mhtEnd.textContent = '';
            if (data && data.state) {
              lobbyState = data.state;
              syncWindowState();
            }
            deactivateSpectatorView();
            updateMobileHudStatus();
            var bsEl = document.getElementById('mobile-blue-score');
            var rsEl = document.getElementById('mobile-red-score');
            if (bsEl) bsEl.textContent = '0';
            if (rsEl) rsEl.textContent = '0';
          } else if (data.type === 'spectator-player') {
            spectatorPlayerStates[data.fromId] = data.state;
            if (!spectatorMatchActive && lobbyState && lobbyState.matchPlayers) {
              var fmp = lobbyState.matchPlayers;
              if (fmp.blue && fmp.red) {
                activateSpectatorView(fmp, lobbyState.matchStartTime);
                updateMobileHudNames();
              }
            }
          } else if (data.type === 'spectator-ball') {
            spectatorBallStates[data.fromId] = data.state;
          } else if (data.type === 'spectator-score') {
            var bsEl = document.getElementById('mobile-blue-score');
            var rsEl = document.getElementById('mobile-red-score');
            if (bsEl) bsEl.textContent = data.blueScore.toString();
            if (rsEl) rsEl.textContent = data.redScore.toString();
            // Also update the in-scene score elements
            var bs3d = document.getElementById('blue-score');
            var rs3d = document.getElementById('red-score');
            if (bs3d) bs3d.setAttribute('text', 'value', data.blueScore.toString());
            if (rs3d) rs3d.setAttribute('text', 'value', data.redScore.toString());
            if (data.hitPlayer) triggerSpectatorImpact(data.hitPlayer);
          } else if (data.type === 'replay-state') {
            spectatorPlayerStates['__replay_blue__'] = data.bp;
            spectatorPlayerStates['__replay_red__'] = data.rp;
            spectatorBallStates['__replay_blue__'] = data.bb;
            spectatorBallStates['__replay_red__'] = data.rb;
            if (data.t) {
              window._replayTimerText = data.t;
              var td3d = document.getElementById('timer-display');
              if (td3d) td3d.setAttribute('text', 'value', data.t);
              var mhtEl = document.getElementById('mobile-hud-timer');
              if (mhtEl) mhtEl.textContent = data.t;
            }
          } else if (data.type === 'replay-timer') {
            window._replayTimerText = data.text;
            var td3d = document.getElementById('timer-display');
            if (td3d) td3d.setAttribute('text', 'value', data.text);
            var mhtEl = document.getElementById('mobile-hud-timer');
            if (mhtEl) mhtEl.textContent = data.text;
          } else if (data.type === 'replay-stage') {
            playerStages[data.player] = data.stage;
            applyBallScale(data.player);
          } else if (data.type === 'spectator-game-state') {
            if (lobbyState) lobbyState.matchGameState = data.state;
            var timerEl = document.getElementById('mobile-hud-timer');
            if (data.state === 'OVERTIME' && timerEl) {
              timerEl.textContent = 'OVERTIME - Next goal wins!';
            } else if (data.state === 'ENDED' && timerEl) {
              timerEl.textContent = 'Match ended';
            }
          } else if (data.type === 'arena-bot-state') {
            var abs = data.s;
            if (abs.rb) {
              var _redBall = document.querySelector('[simple-grab="player: player1"]');
              if (_redBall) {
                _redBall.object3D.position.set(abs.rb.x, abs.rb.y, abs.rb.z);
                var _rbody = _redBall.components['simple-grab'] && _redBall.components['simple-grab'].body;
                if (_rbody) {
                  _rbody.position.set(abs.rb.x, abs.rb.y, abs.rb.z);
                  _rbody.velocity.set(0, 0, 0);
                  _rbody.angularVelocity.set(0, 0, 0);
                }
              }
            }
            if (abs.rbd) {
              var _botEnt = document.querySelector('[advanced-bot]');
              if (_botEnt) _botEnt.object3D.position.set(abs.rbd.x, abs.rbd.y, abs.rbd.z);
              var _botBody = document.querySelector('#bot-body');
              if (_botBody) _botBody.object3D.visible = true;
            }
            if (abs.bb) {
              var _blueBall = document.querySelector('[simple-grab="player: player2"]');
              if (_blueBall) {
                _blueBall.object3D.position.set(abs.bb.x, abs.bb.y, abs.bb.z);
                var _bbody = _blueBall.components['simple-grab'] && _blueBall.components['simple-grab'].body;
                if (_bbody) {
                  _bbody.position.set(abs.bb.x, abs.bb.y, abs.bb.z);
                  _bbody.velocity.set(0, 0, 0);
                  _bbody.angularVelocity.set(0, 0, 0);
                }
              }
            }
            if (abs.bbd) {
              var _blueBody = document.getElementById('spectator-blue-body');
              if (_blueBody) {
                _blueBody.setAttribute('visible', 'true');
                if (_blueBody.components['mixamo-body']) {
                  var _bx = abs.bbd.x, _by = abs.bbd.y, _bz = abs.bbd.z;
                  _blueBody.components['mixamo-body'].remoteHandData = {
                    head: { x: _bx, y: _by, z: _bz, qx: 0, qy: 0, qz: 0, qw: 1 },
                    leftHand: { x: _bx - 0.3, y: _by - 0.5, z: _bz - 0.25, qx: 0, qy: 0, qz: 0, qw: 1 },
                    rightHand: { x: _bx + 0.3, y: _by - 0.5, z: _bz - 0.25, qx: 0, qy: 0, qz: 0, qw: 1 }
                  };
                }
              }
            }
            window._lastArenaBotState = abs;
          }
        });
        hostConn.on('close', function () {
          var statusEl = document.getElementById('mobile-hud-status');
          if (statusEl) statusEl.textContent = 'Reconnecting...';
          window._lastArenaBotState = null;
          isMultiplayer = false;
          connectionState = 'disconnected';
          window.connectionState = 'disconnected';
          if (_mobileSpectatorLobbyNum > 0) {
            setTimeout(function() {
              connectAsMobileSpectator(_mobileSpectatorLobbyNum);
            }, 2000);
          }
        });
        hostConn.on('error', function () {
          var statusEl = document.getElementById('mobile-hud-status');
          if (statusEl) statusEl.textContent = 'Reconnecting...';
          window._lastArenaBotState = null;
          isMultiplayer = false;
          connectionState = 'disconnected';
          window.connectionState = 'disconnected';
          if (_mobileSpectatorLobbyNum > 0) {
            setTimeout(function() {
              connectAsMobileSpectator(_mobileSpectatorLobbyNum);
            }, 3000);
          }
        });
      }

      function updateMobileHudNames() {
        if (!lobbyState || !lobbyState.matchPlayers) return;
        var mp = lobbyState.matchPlayers;
        var blueNick = 'Blue', redNick = 'Red';
        // Use replay names if available (replay uses synthetic IDs that won't match lobby players)
        if (window._replayNames) {
          blueNick = window._replayNames.blue || 'Blue';
          redNick = window._replayNames.red || 'Red';
        } else {
          if (mp.red === '__BOT__') redNick = 'Bot';
          if (lobbyState.players) {
            for (var i = 0; i < lobbyState.players.length; i++) {
              if (lobbyState.players[i].id === mp.blue) blueNick = lobbyState.players[i].nickname;
              if (lobbyState.players[i].id === mp.red && mp.red !== '__BOT__') redNick = lobbyState.players[i].nickname;
            }
          }
        }
        var bnEl = document.getElementById('mobile-blue-name');
        var rnEl = document.getElementById('mobile-red-name');
        if (bnEl) bnEl.textContent = blueNick;
        if (rnEl) rnEl.textContent = redNick;
      }

      function updateMobileHudStatus() {
        var statusEl = document.getElementById('mobile-hud-status');
        if (!statusEl) return;
        if (!lobbyState) {
          statusEl.textContent = 'Connecting...';
          return;
        }
        var mp = lobbyState.matchPlayers;
        if (lobbyState.matchState === 'PLAYING' && mp && mp.blue && mp.red) {
          statusEl.textContent = '';
        } else {
          var pc = lobbyState.players ? lobbyState.players.length : 0;
          statusEl.textContent = 'Waiting for match... (' + pc + ' player' + (pc !== 1 ? 's' : '') + ' in lobby)';
        }
      }

      async function checkPeerAvailability(id) {
        return new Promise((resolve) => {
          const tempPeer = new Peer(id, { host: "0.peerjs.com", port: 443, secure: true });
          const timeout = setTimeout(() => {
            tempPeer.destroy();
            resolve(false);
          }, 2000);
          tempPeer.on("open", () => {
            clearTimeout(timeout);
            tempPeer.destroy();
            resolve(true);
          });
          tempPeer.on("error", (err) => {
            clearTimeout(timeout);
            tempPeer.destroy();
            if (err.type === 'unavailable-id') {
              resolve(false);
            } else {
              resolve(true);
            }
          });
        });
      }

      async function getIceServers() {
        let iceServersConfig = [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun.cloudflare.com:3478' }
        ];
        try {
          const response = await fetch("https://dotmination-turn-proxy.odd-bird-4c2c.workers.dev");
          if (response.ok) iceServersConfig = await response.json();
        } catch (e) {}
        return iceServersConfig;
      }

      async function setupPeer(lobbyNum) {
        cleanupMultiplayer();
        const peerIdNum = Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
        sessionID = 'dodgevr-peer-' + peerIdNum;
        myPlayerId = sessionID;

        const iceServersConfig = await getIceServers();
        peer = new Peer(sessionID, {
          host: "0.peerjs.com", port: 443, secure: true,
          config: { iceServers: iceServersConfig }
        });
        peer.on("open", function () {
          updateMultiplayerStatus('Connecting to host...');
          const hostID = 'dodgevr-host-' + lobbyNum;
          conn = peer.connect(hostID);
          conn.on("open", function () {
            isMultiplayer = true;
            isHost = false;
            syncWindowState();
            conn.send({ type: 'nickname', nickname: window.playerNickname || 'Player' });
            setupPeerHandlers(conn);
            updateMultiplayerStatus('Connected to lobby ' + lobbyNum);
            connectionState = 'connected';
            window.connectionState = 'connected';
            arenaBots.enable();
            const scene = document.querySelector('a-scene');
            if (scene) scene.emit('lobby-state-updated');
          });
          conn.on('error', function () {
            updateMultiplayerStatus('Connection failed.');
            endMultiplayer();
          });
        });
        peer.on("error", function (err) {
          updateMultiplayerStatus('Peer error: ' + err.type);
          endMultiplayer();
        });
      }

      async function setupHost(lobbyNum) {
        cleanupMultiplayer();
        sessionID = 'dodgevr-host-' + lobbyNum;
        myPlayerId = sessionID;

        lobbyState = createLobbyState();
        lobbyState.players.push({ id: myPlayerId, nickname: window.playerNickname || 'Host' });
        assignSpectatorSlot(myPlayerId);

        const iceServersConfig = await getIceServers();
        peer = new Peer(sessionID, {
          host: "0.peerjs.com", port: 443, secure: true,
          config: { iceServers: iceServersConfig }
        });
        peer.on("open", function () {
          isMultiplayer = true;
          isHost = true;
          syncWindowState();
          updateMultiplayerStatus('Lobby ' + lobbyNum + ' created. Waiting for players...');
          connectionState = 'connected';
          window.connectionState = 'connected';
          applyLobbyPosition();
          arenaBots.enable();

          peer.on("connection", function (newConn) {
            // Allow up to 3 VR players + 10 mobile spectators
            if (connections.length >= 13) {
              newConn.close();
              return;
            }
            var entry = { conn: newConn, peerId: newConn.peer, nickname: 'Player', isMobileSpectator: false };
            setupHostHandlers(newConn, entry);
            newConn.on("open", function () {
              connections.push(entry);
              // Send initial lobby state to the new peer
              newConn.send({ type: 'lobby-state', state: lobbyState });
              // If a replay is currently active, notify the new peer so it activates spectator view
              if (window.replayActive) {
                var _rn = window._replayNames || {};
                newConn.send({
                  type: 'match-started',
                  matchPlayers: { blue: '__replay_blue__', red: '__replay_red__' },
                  startTime: Date.now(),
                  blueNick: _rn.blue || '',
                  redNick: _rn.red || ''
                });
                // Send current replay stages so late joiner has correct ball sizes
                if (window.playerStages) {
                  if (window.playerStages.player1 > 1) newConn.send({ type: 'replay-stage', player: 'player1', stage: window.playerStages.player1 });
                  if (window.playerStages.player2 > 1) newConn.send({ type: 'replay-stage', player: 'player2', stage: window.playerStages.player2 });
                }
                // Send current replay score so late joiner doesn't start at 0-0
                var bsEl = document.getElementById('blue-score');
                var rsEl = document.getElementById('red-score');
                if (bsEl && rsEl) {
                  newConn.send({
                    type: 'spectator-score',
                    blueScore: parseInt(bsEl.getAttribute('text').value) || 0,
                    redScore: parseInt(rsEl.getAttribute('text').value) || 0
                  });
                }
              }
            });
          });

          const scene = document.querySelector('a-scene');
          if (scene) scene.emit('lobby-state-updated');
        });
        peer.on("error", function (err) {
          updateMultiplayerStatus('Host error: ' + err.type);
          endMultiplayer();
        });
      }

      // --- Host-side connection handlers ---
      function setupHostHandlers(peerConn, entry) {
        peerConn.on('data', function (data) {
          if (data.type === 'nickname') {
            var playerConns = connections.filter(function(c) { return !c.isMobileSpectator; }).length;
            if (playerConns > 3) {
              peerConn.close();
              return;
            }
            entry.nickname = data.nickname || 'Player';
            lobbyState.players.push({ id: entry.peerId, nickname: entry.nickname });
            assignSpectatorSlot(entry.peerId);
            broadcastLobbyState();
          } else if (data.type === 'mobile-spectator') {
            entry.isMobileSpectator = true;
            entry.nickname = data.nickname || 'Spectator';
            lobbyState.mobileSpectatorCount = connections.filter(function(c) { return c.isMobileSpectator; }).length;
            broadcastLobbyState();
            peerConn.send({ type: 'lobby-state', state: lobbyState });
            // If a match is in progress, send match-started so they activate spectator view
            if (lobbyState.matchState === 'PLAYING' && lobbyState.matchPlayers.blue && lobbyState.matchPlayers.red) {
              peerConn.send({
                type: 'match-started',
                matchPlayers: lobbyState.matchPlayers,
                startTime: lobbyState.matchStartTime
              });
            }
          } else if (data.type === 'queue-action') {
            handleQueueAction(entry.peerId, data.action);
          } else if (data.type === 'match-action') {
            handleMatchAction(entry.peerId, data.action);
          } else if (data.type === 'player-state') {
            handleRelayPlayerState(entry.peerId, data.state);
          } else if (data.type === 'ball-state') {
            handleRelayBallState(entry.peerId, data.state);
          } else if (data.type === 'score-update') {
            if (isMatchOpponent(entry.peerId)) {
              var _prevRemote = multiplayerScore.remote;
              var _prevLocal = multiplayerScore.local;
              multiplayerScore.remote = data.score.local;
              multiplayerScore.local = data.score.remote;
              updateScoreDisplayMultiplayer();
              broadcastSpectatorScore();
              if (multiplayerScore.remote > _prevRemote) {
                var _pt = document.querySelector('#player-target');
                if (_pt && _pt.components['impact-effect']) _pt.components['impact-effect'].playEffect();
                pulseHapticBothHands(1.0, 200);
              }
              if (multiplayerScore.local > _prevLocal) {
                var _bt = document.querySelector('#bot-target');
                if (_bt && _bt.components['impact-effect']) _bt.components['impact-effect'].playEffect();
              }
            } else if (window.isSpectator && lobbyState && lobbyState.matchPlayers) {
              // Host is spectator: relay score between match players and update spectator display
              var smp = lobbyState.matchPlayers;
              var otherMatchId = (entry.peerId === smp.blue) ? smp.red : smp.blue;
              for (var si = 0; si < connections.length; si++) {
                if (connections[si].peerId === otherMatchId && connections[si].conn.open) {
                  connections[si].conn.send({ type: 'score-update', score: data.score });
                  break;
                }
              }
              var isBlue = (entry.peerId === smp.blue);
              var bScore = isBlue ? data.score.local : data.score.remote;
              var rScore = isBlue ? data.score.remote : data.score.local;
              var prevHostScore = lobbyState.matchScore || { blue: 0, red: 0 };
              var hostHitPlayer = null;
              if (bScore > prevHostScore.blue) hostHitPlayer = 'red';
              if (rScore > prevHostScore.red) hostHitPlayer = 'blue';
              lobbyState.matchScore = { blue: bScore, red: rScore };
              var bsEl = document.getElementById('blue-score');
              var rsEl = document.getElementById('red-score');
              if (bsEl) bsEl.setAttribute('text', 'value', bScore.toString());
              if (rsEl) rsEl.setAttribute('text', 'value', rScore.toString());
              if (hostHitPlayer) triggerSpectatorImpact(hostHitPlayer);
              // Relay to other spectators
              var specMsg = { type: 'spectator-score', blueScore: bScore, redScore: rScore, hitPlayer: hostHitPlayer };
              for (var sj = 0; sj < connections.length; sj++) {
                var sc = connections[sj];
                if (sc.conn.open && sc.peerId !== smp.blue && sc.peerId !== smp.red) {
                  sc.conn.send(specMsg);
                }
              }
            }
          } else if (data.type === 'racket-mode') {
            if (isMatchOpponent(entry.peerId)) {
              racketMode.player1[data.hand] = data.active;
            }
            relayToMatchPeer(entry.peerId, data);
          } else if (data.type === 'ready-update') {
            if (isMatchOpponent(entry.peerId)) {
              multiplayerReady.remote = data.ready;
              const gm = document.querySelector('#game-manager');
              if (gm && gm.components['game-manager']) gm.components['game-manager'].updateReadyState();
            }
            relayToMatchPeer(entry.peerId, data);
          } else if (data.type === 'countdown-start') {
            if (isMatchOpponent(entry.peerId)) {
              const gm = document.querySelector('#game-manager');
              if (gm && gm.components['game-manager']) gm.components['game-manager'].syncedStartCountdown(data.startTime);
            }
            relayToMatchPeer(entry.peerId, data);
          } else if (data.type === 'game-state') {
            if (lobbyState) lobbyState.matchGameState = data.state;
            if (data.state === 'ENDED') scheduleAutoEndLobbyMatch(window.isLobbyBotMatch);
            if (isMatchOpponent(entry.peerId)) {
              const gm = document.querySelector('#game-manager');
              if (gm && gm.components['game-manager']) {
                const gmComp = gm.components['game-manager'];
                var prevState = gmComp.matchState;
                gmComp.matchState = data.state;
                if (data.state === 'OVERTIME') {
                  gmComp.timerDisplay.setAttribute('text', 'value', 'OVERTIME - Next goal wins!');
                } else if (data.state === 'ENDED') {
                  var wasCancelled = data.winner === 'Match cancelled';
                  const flipped = wasCancelled ? 'Match cancelled' : (data.winner.includes('You win!') ? 'Opponent wins!' : 'You win!');
                  gmComp.startMessage.setAttribute('visible', true);
                  gmComp.startMessage.setAttribute('text', 'value', flipped);
                  gmComp.timerDisplay.setAttribute('text', 'value', 'Match ended');
                  gmComp.gameStarted = false;
                  sceneEl.emit('matchEnded');
                  if (!wasCancelled && !gmComp._historySaved) {
                    _saveMatchHistoryFromState(gmComp, prevState === 'OVERTIME');
                  }
                }
              }
            } else if (window.isSpectator) {
              var hostSpecTd = document.getElementById('timer-display');
              if (data.state === 'OVERTIME' && hostSpecTd) {
                hostSpecTd.setAttribute('text', 'value', 'OVERTIME - Next goal wins!');
              } else if (data.state === 'ENDED' && hostSpecTd) {
                hostSpecTd.setAttribute('text', 'value', 'Match ended');
              }
            }
            relayToMatchPeer(entry.peerId, data);
            // Broadcast game-state to spectators (non-match peers)
            for (var gi = 0; gi < connections.length; gi++) {
              var gc = connections[gi];
              var gmp = lobbyState ? lobbyState.matchPlayers : {};
              if (gc.conn.open && gc.peerId !== entry.peerId && gc.peerId !== (gmp.blue) && gc.peerId !== (gmp.red)) {
                gc.conn.send({ type: 'spectator-game-state', state: data.state });
              }
            }
          } else if (data.type === 'stats-sync') {
            if (isMatchOpponent(entry.peerId)) {
              matchStats.player1 = data.stats;
              if (playerStages.player1 !== data.stage) {
                playerStages.player1 = data.stage;
                applyBallScale('player1');
              }
            }
          } else if (data.type === 'mode-change') {
            const scene = document.querySelector('a-scene');
            const mt = scene && scene.components['multiplayer-toggle'];
            if (mt) mt.applyModeChange(data.mode, data.enabled);
          }
        });
        peerConn.on('close', function () {
          handlePeerDisconnect(entry.peerId);
        });
        peerConn.on('error', function () {
          handlePeerDisconnect(entry.peerId);
        });
      }

      function isMatchOpponent(peerId) {
        if (!lobbyState) return false;
        var mp = lobbyState.matchPlayers;
        if (mp.blue === myPlayerId && mp.red === peerId) return true;
        if (mp.red === myPlayerId && mp.blue === peerId) return true;
        return false;
      }

      function getMatchOpponentConn() {
        if (!lobbyState) return null;
        var mp = lobbyState.matchPlayers;
        var opponentId = null;
        if (mp.blue === myPlayerId) opponentId = mp.red;
        else if (mp.red === myPlayerId) opponentId = mp.blue;
        if (!opponentId) return null;
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].peerId === opponentId) return connections[i].conn;
        }
        return null;
      }

      // Relay a message to the other match player (when host is spectator)
      function relayToMatchPeer(fromPeerId, data) {
        if (!window.isSpectator || !lobbyState || !lobbyState.matchPlayers) return;
        var smp = lobbyState.matchPlayers;
        var targetId = (fromPeerId === smp.blue) ? smp.red : smp.blue;
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].peerId === targetId && connections[i].conn.open) {
            connections[i].conn.send(data);
            break;
          }
        }
      }

      function handleRelayPlayerState(fromPeerId, state) {
        if (isMatchOpponent(fromPeerId)) {
          remotePlayerState = state;
        }
        // Always store for rendering (lobby view, spectator view, etc.)
        spectatorPlayerStates[fromPeerId] = state;

        var mp = lobbyState ? lobbyState.matchPlayers : null;
        var matchOpponentOfSender = null;
        if (mp) {
          if (fromPeerId === mp.blue) matchOpponentOfSender = mp.red;
          else if (fromPeerId === mp.red) matchOpponentOfSender = mp.blue;
        }
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].peerId !== fromPeerId && connections[i].conn.open) {
            if (connections[i].peerId === matchOpponentOfSender) {
              connections[i].conn.send({ type: 'player-state', state: state });
            } else {
              connections[i].conn.send({ type: 'spectator-player', fromId: fromPeerId, state: state });
            }
          }
        }
      }

      function handleRelayBallState(fromPeerId, state) {
        if (isMatchOpponent(fromPeerId)) {
          remoteBallState = state;
        }
        spectatorBallStates[fromPeerId] = state;

        var mp = lobbyState ? lobbyState.matchPlayers : null;
        var matchOpponentOfSender = null;
        if (mp) {
          if (fromPeerId === mp.blue) matchOpponentOfSender = mp.red;
          else if (fromPeerId === mp.red) matchOpponentOfSender = mp.blue;
        }
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].peerId !== fromPeerId && connections[i].conn.open) {
            if (connections[i].peerId === matchOpponentOfSender) {
              connections[i].conn.send({ type: 'ball-state', state: state });
            } else {
              connections[i].conn.send({ type: 'spectator-ball', fromId: fromPeerId, state: state });
            }
          }
        }
      }

      function handlePeerDisconnect(peerId) {
        var wasMobile = connections.some(function(c) { return c.peerId === peerId && c.isMobileSpectator; });
        connections = connections.filter(function (c) { return c.peerId !== peerId; });
        if (wasMobile) {
          if (lobbyState) {
            lobbyState.mobileSpectatorCount = connections.filter(function(c) { return c.isMobileSpectator; }).length;
            broadcastLobbyState();
          }
          return;
        }
        if (lobbyState) {
          var wasMatchPlayer = (lobbyState.matchPlayers.blue === peerId || lobbyState.matchPlayers.red === peerId);
          // End match first (before removing from players), so endLobbyMatch can still see who was in match
          if (wasMatchPlayer) {
            endLobbyMatch();
          }
          // Now remove the disconnected player from all state
          lobbyState.players = lobbyState.players.filter(function (p) { return p.id !== peerId; });
          lobbyState.queue = lobbyState.queue.filter(function (id) { return id !== peerId; });
          for (var s = 0; s < lobbyState.spectatorSlots.length; s++) {
            if (lobbyState.spectatorSlots[s] === peerId) lobbyState.spectatorSlots[s] = null;
          }
          if (lobbyState.matchPlayers.blue === peerId) lobbyState.matchPlayers.blue = null;
          if (lobbyState.matchPlayers.red === peerId) lobbyState.matchPlayers.red = null;
          delete spectatorPlayerStates[peerId];
          delete spectatorBallStates[peerId];
          broadcastLobbyState();
          applyLobbyPosition();
        }
        if (connections.length === 0 && isHost) {
          updateMultiplayerStatus('All players left. Waiting...');
        }
      }

      // --- Peer-side connection handlers ---
      function setupPeerHandlers(hostConn) {
        hostConn.on('data', function (data) {
          if (data.type === 'lobby-state') {
            var prevOpponent = null;
            if (lobbyState && lobbyState.matchPlayers) {
              if (lobbyState.matchPlayers.blue === myPlayerId) prevOpponent = lobbyState.matchPlayers.red;
              else if (lobbyState.matchPlayers.red === myPlayerId) prevOpponent = lobbyState.matchPlayers.blue;
            }
            lobbyState = data.state;
            syncWindowState();
            // Clear stale match state if opponent changed
            var newOpponent = null;
            var mp = lobbyState.matchPlayers;
            if (mp) {
              if (mp.blue === myPlayerId) newOpponent = mp.red;
              else if (mp.red === myPlayerId) newOpponent = mp.blue;
            }
            if (prevOpponent !== newOpponent) {
              remotePlayerState = null;
              remoteBallState = null;
              var _gm = document.querySelector('#game-manager');
              if (_gm && _gm.components['game-manager']) _gm.components['game-manager'].respawnBalls();
            }
            applyLobbyPosition();
            updateOpponentNickname();
            // Sync arena bots based on match slot occupancy
            if (arenaBots.enabled && mp) {
              arenaBots.setSlotHuman('blue', !!mp.blue);
              arenaBots.setSlotHuman('red', !!mp.red);
            }
            console.log('[LOBBY] lobby-state received. matchState=' + lobbyState.matchState +
              ' blue=' + (mp && mp.blue) + ' red=' + (mp && mp.red) +
              ' myId=' + myPlayerId);
            if (mp && lobbyState.matchState === 'PLAYING' &&
                mp.blue !== myPlayerId && mp.red !== myPlayerId &&
                !spectatorMatchBlueId) {
              activateSpectatorView(mp, lobbyState.matchStartTime);
            }
            const scene = document.querySelector('a-scene');
            if (scene) scene.emit('lobby-state-updated');
          } else if (data.type === 'player-state') {
            remotePlayerState = data.state;
          } else if (data.type === 'ball-state') {
            remoteBallState = data.state;
          } else if (data.type === 'score-update') {
            var _prevRemote = multiplayerScore.remote;
            var _prevLocal = multiplayerScore.local;
            multiplayerScore.remote = data.score.local;
            multiplayerScore.local = data.score.remote;
            updateScoreDisplayMultiplayer();
            if (multiplayerScore.remote > _prevRemote) {
              var _pt = document.querySelector('#player-target');
              if (_pt && _pt.components['impact-effect']) _pt.components['impact-effect'].playEffect();
              pulseHapticBothHands(1.0, 200);
            }
            if (multiplayerScore.local > _prevLocal) {
              var _bt = document.querySelector('#bot-target');
              if (_bt && _bt.components['impact-effect']) _bt.components['impact-effect'].playEffect();
            }
          } else if (data.type === 'racket-mode') {
            racketMode.player1[data.hand] = data.active;
          } else if (data.type === 'ready-update') {
            multiplayerReady.remote = data.ready;
            const gm = document.querySelector('#game-manager');
            if (gm && gm.components['game-manager']) gm.components['game-manager'].updateReadyState();
          } else if (data.type === 'countdown-start') {
            const gm = document.querySelector('#game-manager');
            if (gm && gm.components['game-manager']) gm.components['game-manager'].syncedStartCountdown(data.startTime);
          } else if (data.type === 'game-state') {
            const gm = document.querySelector('#game-manager');
            if (gm && gm.components['game-manager']) {
              const gmComp = gm.components['game-manager'];
              var prevState2 = gmComp.matchState;
              gmComp.matchState = data.state;
              if (data.state === 'OVERTIME') {
                gmComp.timerDisplay.setAttribute('text', 'value', 'OVERTIME - Next goal wins!');
              } else if (data.state === 'ENDED') {
                var wasCancelled2 = data.winner === 'Match cancelled';
                const flipped = wasCancelled2 ? 'Match cancelled' : (data.winner.includes('You win!') ? 'Opponent wins!' : 'You win!');
                gmComp.startMessage.setAttribute('visible', true);
                gmComp.startMessage.setAttribute('text', 'value', flipped);
                gmComp.timerDisplay.setAttribute('text', 'value', 'Match ended');
                gmComp.gameStarted = false;
                sceneEl.emit('matchEnded');
                if (!wasCancelled2 && !gmComp._historySaved) {
                  _saveMatchHistoryFromState(gmComp, prevState2 === 'OVERTIME');
                }
              }
            }
          } else if (data.type === 'stats-sync') {
            matchStats.player1 = data.stats;
            if (playerStages.player1 !== data.stage) {
              playerStages.player1 = data.stage;
              applyBallScale('player1');
            }
          } else if (data.type === 'match-started') {
            console.log('[SPECTATOR] match-started received. blue=' + (data.matchPlayers && data.matchPlayers.blue) + ' red=' + (data.matchPlayers && data.matchPlayers.red));
            onMatchStarted(data);
          } else if (data.type === 'match-ended') {
            onMatchEnded(data);
          } else if (data.type === 'mode-change') {
            const scene = document.querySelector('a-scene');
            const mt = scene && scene.components['multiplayer-toggle'];
            if (mt) mt.applyModeChange(data.mode, data.enabled);
          } else if (data.type === 'spectator-player') {
            if (!spectatorPlayerStates[data.fromId]) {
              console.log('[SPECTATOR] First state from: ' + data.fromId + ' matchActive=' + spectatorMatchActive);
            }
            spectatorPlayerStates[data.fromId] = data.state;
            if (!spectatorMatchActive && lobbyState && lobbyState.matchPlayers) {
              var fmp = lobbyState.matchPlayers;
              if (fmp.blue && fmp.red &&
                  fmp.blue !== myPlayerId && fmp.red !== myPlayerId) {
                console.log('[SPECTATOR] Fallback activation from spectator-player message');
                activateSpectatorView(fmp, lobbyState.matchStartTime);
              }
            }
          } else if (data.type === 'spectator-ball') {
            spectatorBallStates[data.fromId] = data.state;
          } else if (data.type === 'spectator-score') {
            var bsEl = document.getElementById('blue-score');
            var rsEl = document.getElementById('red-score');
            if (bsEl) bsEl.setAttribute('text', 'value', data.blueScore.toString());
            if (rsEl) rsEl.setAttribute('text', 'value', data.redScore.toString());
            if (data.hitPlayer) triggerSpectatorImpact(data.hitPlayer);
          } else if (data.type === 'replay-state') {
            spectatorPlayerStates['__replay_blue__'] = data.bp;
            spectatorPlayerStates['__replay_red__'] = data.rp;
            spectatorBallStates['__replay_blue__'] = data.bb;
            spectatorBallStates['__replay_red__'] = data.rb;
            if (data.t) {
              window._replayTimerText = data.t;
              var rtTd = document.getElementById('timer-display');
              if (rtTd) rtTd.setAttribute('text', 'value', data.t);
              var rtMht = document.getElementById('mobile-hud-timer');
              if (rtMht) rtMht.textContent = data.t;
            }
          } else if (data.type === 'replay-timer') {
            window._replayTimerText = data.text;
            var rtTd = document.getElementById('timer-display');
            if (rtTd) rtTd.setAttribute('text', 'value', data.text);
            var rtMht = document.getElementById('mobile-hud-timer');
            if (rtMht) rtMht.textContent = data.text;
          } else if (data.type === 'replay-stage') {
            playerStages[data.player] = data.stage;
            applyBallScale(data.player);
          } else if (data.type === 'spectator-game-state') {
            if (lobbyState) lobbyState.matchGameState = data.state;
            var peerTd = document.getElementById('timer-display');
            if (data.state === 'OVERTIME' && peerTd) {
              peerTd.setAttribute('text', 'value', 'OVERTIME - Next goal wins!');
            } else if (data.state === 'ENDED' && peerTd) {
              peerTd.setAttribute('text', 'value', 'Match ended');
            }
          } else if (data.type === 'arena-bot-state') {
            window._lastArenaBotState = data.s;
            var abs = data.s;
            if (abs.rb) {
              var _redBall = document.querySelector('[simple-grab="player: player1"]');
              if (_redBall) {
                _redBall.object3D.position.set(abs.rb.x, abs.rb.y, abs.rb.z);
                var _rbody = _redBall.components['simple-grab'] && _redBall.components['simple-grab'].body;
                if (_rbody) {
                  _rbody.position.set(abs.rb.x, abs.rb.y, abs.rb.z);
                  _rbody.velocity.set(0, 0, 0);
                  _rbody.angularVelocity.set(0, 0, 0);
                }
              }
            }
            if (abs.rbd) {
              var _botEnt = document.querySelector('[advanced-bot]');
              if (_botEnt) _botEnt.object3D.position.set(abs.rbd.x, abs.rbd.y, abs.rbd.z);
              var _botBody = document.querySelector('#bot-body');
              if (_botBody) {
                _botBody.object3D.visible = true;
                _botBody.object3D.position.set(abs.rbd.x, abs.rbd.y, abs.rbd.z);
              }
            }
            if (abs.bb) {
              var _blueBall = document.querySelector('[simple-grab="player: player2"]');
              if (_blueBall) {
                _blueBall.object3D.position.set(abs.bb.x, abs.bb.y, abs.bb.z);
                var _bbody = _blueBall.components['simple-grab'] && _blueBall.components['simple-grab'].body;
                if (_bbody) {
                  _bbody.position.set(abs.bb.x, abs.bb.y, abs.bb.z);
                  _bbody.velocity.set(0, 0, 0);
                  _bbody.angularVelocity.set(0, 0, 0);
                }
              }
            }
            if (abs.bbd) {
              var _specBlue = document.getElementById('spectator-blue-body');
              if (_specBlue) {
                _specBlue.setAttribute('visible', 'true');
                _specBlue.object3D.position.set(abs.bbd.x, abs.bbd.y, abs.bbd.z);
              }
            }
          }
        });
        hostConn.on('close', function () {
          updateMultiplayerStatus('Disconnected from lobby.');
          endMultiplayer();
        });
        hostConn.on('error', function () {
          updateMultiplayerStatus('Connection error.');
          endMultiplayer();
        });
      }

      // --- Lobby state broadcast (host only) ---
      function broadcastLobbyState() {
        if (!isHost || !lobbyState) return;
        syncWindowState();
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].conn.open) {
            connections[i].conn.send({ type: 'lobby-state', state: lobbyState });
          }
        }
        updateOpponentNickname();
        const scene = document.querySelector('a-scene');
        if (scene) scene.emit('lobby-state-updated');
      }

      // --- Queue actions ---
      function sendQueueAction(action) {
        if (isHost) {
          handleQueueAction(myPlayerId, action);
        } else if (conn && conn.open) {
          conn.send({ type: 'queue-action', action: action });
        }
      }
      window.sendQueueAction = sendQueueAction;

      function handleQueueAction(playerId, action) {
        if (!lobbyState) return;
        if (action === 'join') {
          if (lobbyState.queue.indexOf(playerId) < 0) {
            lobbyState.queue.push(playerId);
          }
          tryAssignMatchPlayers();
        } else if (action === 'leave') {
          lobbyState.queue = lobbyState.queue.filter(function (id) { return id !== playerId; });
          if (lobbyState.matchState !== 'PLAYING') {
            var leavingMatchSpot = (lobbyState.matchPlayers.blue === playerId || lobbyState.matchPlayers.red === playerId);
            if (lobbyState.matchPlayers.blue === playerId) {
              lobbyState.matchPlayers.blue = null;
              assignSpectatorSlot(playerId);
              if (arenaBots.enabled) arenaBots.setSlotHuman('blue', false);
            } else if (lobbyState.matchPlayers.red === playerId) {
              lobbyState.matchPlayers.red = null;
              assignSpectatorSlot(playerId);
              if (arenaBots.enabled) arenaBots.setSlotHuman('red', false);
            }
            if (leavingMatchSpot) {
              remotePlayerState = null;
              remoteBallState = null;
              var _gm = document.querySelector('#game-manager');
              if (_gm && _gm.components['game-manager']) _gm.components['game-manager'].respawnBalls();
            }
            tryAssignMatchPlayers();
          }
        }
        broadcastLobbyState();
        // Always reposition the host after any queue change
        applyLobbyPosition();
      }

      function tryAssignMatchPlayers() {
        if (!lobbyState) return;
        if (lobbyState.matchState === 'PLAYING') return;
        if (lobbyState.queue.length === 0) return;

        // Fill available match spots one at a time from the queue
        while (lobbyState.queue.length > 0 && (!lobbyState.matchPlayers.blue || !lobbyState.matchPlayers.red)) {
          var nextId = lobbyState.queue.shift();
          if (!lobbyState.matchPlayers.blue) {
            lobbyState.matchPlayers.blue = nextId;
            arenaBots.setSlotHuman('blue', true);
          } else {
            lobbyState.matchPlayers.red = nextId;
            arenaBots.setSlotHuman('red', true);
          }
          // Remove from spectator slot
          for (var s = 0; s < lobbyState.spectatorSlots.length; s++) {
            if (lobbyState.spectatorSlots[s] === nextId) {
              lobbyState.spectatorSlots[s] = null;
            }
          }
        }
      }

      // --- Match actions ---
      function sendMatchAction(action) {
        if (isHost) {
          handleMatchAction(myPlayerId, action);
        } else if (conn && conn.open) {
          conn.send({ type: 'match-action', action: action });
        }
      }
      window.sendMatchAction = sendMatchAction;

      function handleMatchAction(playerId, action) {
        if (!lobbyState) return;
        var mp = lobbyState.matchPlayers;
        if (playerId !== mp.blue && playerId !== mp.red) return;

        if (action === 'start' && lobbyState.matchState !== 'PLAYING') {
          if (!mp.blue) return;
          startLobbyMatch();
        } else if (action === 'end' && lobbyState.matchState === 'PLAYING') {
          endLobbyMatch();
        }
      }

      function startLobbyMatch() {
        if (!lobbyState) return;
        var mp = lobbyState.matchPlayers;

        var isBotMatch = mp.blue && !mp.red;
        window.isLobbyBotMatch = isBotMatch;
        if (isBotMatch) {
          mp.red = '__BOT__';
          if (arenaBots.enabled) arenaBots.setSlotHuman('red', true);
        }

        if (_autoEndTimer) { clearTimeout(_autoEndTimer); _autoEndTimer = null; }
        lobbyState.matchState = 'PLAYING';
        lobbyState.matchScore = { blue: 0, red: 0 };
        lobbyState.matchGameState = 'PLAYING';

        var startTime = Date.now();
        lobbyState.matchStartTime = startTime;

        // If host is a match player, enable match mode and start countdown
        if (mp.blue === myPlayerId || mp.red === myPlayerId) {
          activateMatchMode(startTime);
        } else {
          activateSpectatorView(mp, startTime);
        }

        // Notify peers with synced start time
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].conn.open) {
            connections[i].conn.send({
              type: 'match-started',
              matchPlayers: mp,
              startTime: startTime,
              isBotMatch: isBotMatch
            });
          }
        }

        broadcastLobbyState();
      }

      var _autoEndTimer = null;
      function scheduleAutoEndLobbyMatch(isBotMatch) {
        if (_autoEndTimer) return;
        var delay = isBotMatch ? 4000 : 5000;
        _autoEndTimer = setTimeout(function() {
          _autoEndTimer = null;
          if (lobbyState && lobbyState.matchState === 'PLAYING') {
            endLobbyMatch();
          }
        }, delay);
      }

      function endLobbyMatch() {
        if (!lobbyState) return;
        if (_autoEndTimer) { clearTimeout(_autoEndTimer); _autoEndTimer = null; }
        var wasBotMatch = window.isLobbyBotMatch;
        window.isLobbyBotMatch = false;
        var oldBlue = lobbyState.matchPlayers.blue;
        var oldRed = lobbyState.matchPlayers.red;

        lobbyState.matchState = 'WAITING';
        lobbyState.matchPlayers = { blue: null, red: null };
        lobbyState.matchStartTime = 0;
        lobbyState.matchScore = { blue: 0, red: 0 };
        lobbyState.matchGameState = null;

        // Assign old match players to spectator slots (skip bot sentinel)
        if (oldBlue) assignSpectatorSlot(oldBlue);
        if (oldRed && oldRed !== '__BOT__') assignSpectatorSlot(oldRed);

        // Re-enable arena bots for all vacated slots
        if (arenaBots.enabled) {
          arenaBots.setSlotHuman('blue', false);
          arenaBots.setSlotHuman('red', false);
        }

        // Deactivate match/spectator state for the host
        if (oldBlue === myPlayerId || oldRed === myPlayerId) {
          deactivateMatchMode();
        }
        deactivateSpectatorView();

        // Try to assign next match from queue BEFORE notifying peers,
        // so the lobby-state included in match-ended is fully up to date
        tryAssignMatchPlayers();

        // For bot matches, auto-re-queue the host so they can quickly rematch
        if (wasBotMatch) {
          for (var s = 0; s < lobbyState.spectatorSlots.length; s++) {
            if (lobbyState.spectatorSlots[s] === myPlayerId) lobbyState.spectatorSlots[s] = null;
          }
          if (!lobbyState.matchPlayers.blue) {
            lobbyState.matchPlayers.blue = myPlayerId;
            if (arenaBots.enabled) arenaBots.setSlotHuman('blue', true);
          } else if (!lobbyState.matchPlayers.red) {
            lobbyState.matchPlayers.red = myPlayerId;
            if (arenaBots.enabled) arenaBots.setSlotHuman('red', true);
          }
        }

        // Notify peers with the updated lobby state so they can position correctly
        for (var i = 0; i < connections.length; i++) {
          if (connections[i].conn.open) {
            connections[i].conn.send({ type: 'match-ended', state: lobbyState });
          }
        }

        broadcastLobbyState();

        // Move the host to their new position (spectator or match if reassigned from queue)
        applyLobbyPosition();
      }

      function assignSpectatorSlot(playerId) {
        if (!lobbyState) return;
        for (var s = 0; s < lobbyState.spectatorSlots.length; s++) {
          if (lobbyState.spectatorSlots[s] === null) {
            lobbyState.spectatorSlots[s] = playerId;
            return;
          }
        }
      }

      // --- Position management based on lobby state ---
      function applyLobbyPosition() {
        if (window.isMobileSpectator) return;
        if (!lobbyState) return;
        var vrMenu = document.querySelector('a-scene').components['vr-menu'];
        if (!vrMenu) return;

        var mp = lobbyState.matchPlayers;
        if (mp.blue === myPlayerId || mp.red === myPlayerId) {
          vrMenu.moveToMatchPosition();
        } else {
          // Moving to spectator: clear any stale match rendering state
          remotePlayerState = null;
          remoteBallState = null;
          var slotIdx = lobbyState.spectatorSlots.indexOf(myPlayerId);
          if (slotIdx < 0) {
            assignSpectatorSlot(myPlayerId);
            slotIdx = lobbyState.spectatorSlots.indexOf(myPlayerId);
          }
          if (slotIdx >= 0) {
            vrMenu.moveToSpectator(slotIdx);
          }
        }
      }

      // Peer callbacks for match start/end
      function onMatchStarted(data) {
        var mp = data.matchPlayers;
        if (!mp) return;
        if (data.blueNick || data.redNick) {
          window._replayNames = { blue: data.blueNick || '', red: data.redNick || '' };
        } else {
          window._replayNames = null;
        }
        // Reset ball stages for replay so applyRemoteBallVisuals uses correct scale
        if (mp.blue === '__replay_blue__' || mp.red === '__replay_red__') {
          playerStages.player1 = 1;
          playerStages.player2 = 1;
          applyBallScale('player1');
          applyBallScale('player2');
        }
        if (mp.blue === myPlayerId || mp.red === myPlayerId) {
          activateMatchMode(data.startTime);
        } else {
          activateSpectatorView(mp, data.startTime, data.blueNick, data.redNick);
        }

        // Close menu if open
        var vrMenu = document.querySelector('a-scene').components['vr-menu'];
        if (vrMenu && vrMenu.menuVisible) {
          vrMenu.menuVisible = false;
          if (vrMenu.menu) vrMenu.menu.setAttribute('visible', false);
          vrMenu.setRaycasters(false);
        }
      }

      function onMatchEnded(data) {
        window._replayTimerText = null;
        window._replayNames = null;
        // Apply the updated lobby state FIRST so positions are correct
        if (data && data.state) {
          lobbyState = data.state;
          syncWindowState();
        }
        deactivateMatchMode();
        deactivateSpectatorView();
        // Now move to the correct position (spectator slot or match if reassigned from queue)
        applyLobbyPosition();
      }

      function activateSpectatorView(mp, matchStartTime, msgBlueNick, msgRedNick) {

        var _abRedActive = window.arenaBots && window.arenaBots.enabled && window.arenaBots.redBotActive;

        var currentScore = (lobbyState && lobbyState.matchScore) || { blue: 0, red: 0 };
        var blueScoreEl = document.getElementById('blue-score');
        var redScoreEl = document.getElementById('red-score');
        if (blueScoreEl) blueScoreEl.setAttribute('text', 'value', currentScore.blue.toString());
        if (redScoreEl) redScoreEl.setAttribute('text', 'value', currentScore.red.toString());
        // Apply current game state (e.g. OVERTIME) for late joiners
        var currentGameState = lobbyState && lobbyState.matchGameState;
        if (currentGameState === 'OVERTIME' && timerDisplay) {
          timerDisplay.setAttribute('text', 'value', 'OVERTIME - Next goal wins!');
        } else if (currentGameState === 'ENDED' && timerDisplay) {

        console.log('[SPECTATOR] score-display visible=' + (scoreDisplay ? scoreDisplay.object3D.visible : 'null') +

          ' score=' + currentScore.blue + '-' + currentScore.red);

        // Show player name labels — prefer names passed in the message (e.g. from replay)
        var blueNick = msgBlueNick || '', redNick = msgRedNick || '';
        if (!blueNick || !redNick) {
          if (mp.red === '__BOT__' && !redNick) {
            redNick = 'Bot';
          }
          if (lobbyState && lobbyState.players) {
            for (var i = 0; i < lobbyState.players.length; i++) {
              if (!blueNick && lobbyState.players[i].id === mp.blue) blueNick = lobbyState.players[i].nickname;
              if (!redNick && lobbyState.players[i].id === mp.red && mp.red !== '__BOT__') redNick = lobbyState.players[i].nickname;
            }
          }
        }
        var blueName = document.getElementById('spectator-blue-name');
        var redName = document.getElementById('spectator-red-name');
        if (blueName) { blueName.setAttribute('text', 'value', blueNick || 'Blue'); blueName.object3D.visible = true; }
        if (redName) { redName.setAttribute('text', 'value', redNick || 'Red'); redName.object3D.visible = true; }

        console.log('[SPECTATOR] spectatorMatchActive=' + spectatorMatchActive + ' blueId=' + spectatorMatchBlueId + ' redId=' + spectatorMatchRedId);

        // Sync mobile HUD if applicable
        if (window.isMobileSpectator) {
          var mbsEl = document.getElementById('mobile-blue-score');
          var mrsEl = document.getElementById('mobile-red-score');
          if (mbsEl) mbsEl.textContent = currentScore.blue.toString();
          if (mrsEl) mrsEl.textContent = currentScore.red.toString();
          updateMobileHudNames();
          updateMobileHudStatus();
        }
      }

      function deactivateSpectatorView() {
        // Keep spectatorPlayerStates/BallStates — they're needed for lobby rendering
        spectatorMatchBlueId = null;
        spectatorMatchRedId = null;
        spectatorMatchActive = false;
        spectatorMatchStartTime = 0;
        var specBlueBody = document.getElementById('spectator-blue-body');
        if (specBlueBody && !arenaBots.blueBotActive) {
          specBlueBody.setAttribute('visible', false);
          if (specBlueBody.components['mixamo-body']) {

        var botBody = document.querySelector('#bot-body');
        if (botBody && botBody.components['mixamo-body'] && !arenaBots.redBotActive) {
          botBody.components['mixamo-body'].remoteHandData = null;
        }
        if (!window.isMultiplayer) {
          var bot = document.querySelector('[advanced-bot]');
          if (bot) bot.setAttribute('advanced-bot', 'enabled', true);

        // Hide score/timer and name labels
        var scoreDisplay = document.getElementById('score-display');
        var timerDisplay = document.getElementById('timer-display');
        if (scoreDisplay) scoreDisplay.object3D.visible = false;
        if (timerDisplay) timerDisplay.object3D.visible = false;
        var blueName = document.getElementById('spectator-blue-name');
        var redName = document.getElementById('spectator-red-name');
        if (blueName) blueName.object3D.visible = false;
        if (redName) redName.object3D.visible = false;
      }

      function activateMatchMode(startTime) {
        // Clean up any spectator rendering state from before becoming a match player
        deactivateSpectatorView();

        var bot = document.querySelector('[advanced-bot]');
        if (window.isLobbyBotMatch) {
          if (bot) {
            bot.components['advanced-bot'].isMultiplayer = false;
            bot.components['advanced-bot'].gameStarted = true;
            bot.setAttribute('advanced-bot', 'enabled', true);
          }
          var botBody = document.querySelector('#bot-body');
          if (botBody) botBody.object3D.visible = true;
        } else {
          var _abRedActive = window.arenaBots && window.arenaBots.enabled && window.arenaBots.redBotActive;
          if (bot && !_abRedActive) bot.setAttribute('advanced-bot', 'enabled', false);
        }
        multiplayerScore = { local: 0, remote: 0 };
        multiplayerReady = { local: false, remote: false };
        updateScoreDisplayMultiplayer();
        window.isSpectator = false;

        var gameManager = document.querySelector('#game-manager');
        if (gameManager && gameManager.components['game-manager']) {
          var gm = gameManager.components['game-manager'];
          gm.scoreDisplay.setAttribute('visible', false);
          gm.timerDisplay.setAttribute('visible', false);
          if (startTime) {
            gm.syncedStartCountdown(startTime);
          }
        }
      }

      function deactivateMatchMode() {
        remotePlayerState = null;
        remoteBallState = null;
        multiplayerReady = { local: false, remote: false };
        var botBody = document.querySelector('#bot-body');
        if (botBody && botBody.components['mixamo-body']) {
          botBody.components['mixamo-body'].remoteHandData = null;
        }
        var _abRedActive = window.arenaBots && window.arenaBots.enabled && window.arenaBots.redBotActive;
        var bot = document.querySelector('[advanced-bot]');
        if (bot && !_abRedActive) bot.setAttribute('advanced-bot', 'enabled', false);
        var player = document.querySelector('#player');
        if (player) player.setAttribute('player-collision', 'enabled', false);
        var gameManager = document.querySelector('#game-manager');
        if (gameManager && gameManager.components['game-manager']) {
          var gm = gameManager.components['game-manager'];
          var wasActive = gm.matchState === 'PLAYING' || gm.matchState === 'OVERTIME' || gm.matchState === 'COUNTDOWN';
          gm.matchState = 'WAITING';
          gm.gameStarted = false;
          gm.startMessage.setAttribute('visible', false);
          gm.scoreDisplay.setAttribute('visible', false);
          gm.timerDisplay.setAttribute('visible', false);
          gm.respawnBalls();
          if (wasActive) {
            gm.el.sceneEl.emit('matchEnded');
          }
        }
      }

      // --- Send functions (route based on host/peer) ---
      function sendPlayerState(state) {
        if (!isMultiplayer) return;
        if (isHost) {
          var opponentConn = getMatchOpponentConn();
          for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if (!c.conn.open) continue;
            if (opponentConn && c.conn === opponentConn) {
              c.conn.send({ type: 'player-state', state: state });
            } else {
              c.conn.send({ type: 'spectator-player', fromId: myPlayerId, state: state });
            }
          }
        } else if (conn && conn.open) {
          conn.send({ type: 'player-state', state: state });
        }
      }

      function sendBallState(state) {
        if (!isMultiplayer) return;
        if (isHost) {
          var opponentConn = getMatchOpponentConn();
          for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if (!c.conn.open) continue;
            if (opponentConn && c.conn === opponentConn) {
              c.conn.send({ type: 'ball-state', state: state });
            } else {
              c.conn.send({ type: 'spectator-ball', fromId: myPlayerId, state: state });
            }
          }
        } else if (conn && conn.open) {
          conn.send({ type: 'ball-state', state: state });
        }
      }

      function applyRemoteBallVisuals(ballEl, state) {
        if (!ballEl) return;
        var grab = ballEl.components['simple-grab'];
        var player = grab ? grab.data.player : 'player1';
        if (state.ro) {
          var s = state.rs || 0.5;
          ballEl.object3D.scale.setScalar(s);
          if (grab && grab.body && grab.body.shapes[0]) {
            grab.body.shapes[0].radius = BALL_BASE_RADIUS * s;
            grab.body.updateBoundingRadius();
          }
          var opacity = Math.max(0, (s - 0.5) / 0.5);
          ballEl.object3D.traverse(function(node) {
            if (node.isMesh && node.material) {
              node.material.transparent = true;
              node.material.opacity = opacity;
            }
          });
          var lightChild = ballEl.querySelector('[light]');
          if (lightChild) {
            var lc = lightChild.components.light;
            if (lc && lc.light) lc.light.intensity = 1.5 * opacity;
          }
        } else {
          var fullScale = getStageBallScale(playerStages[player] || 1);
          ballEl.object3D.scale.setScalar(fullScale);
          if (grab && grab.body && grab.body.shapes[0]) {
            grab.body.shapes[0].radius = BALL_BASE_RADIUS * fullScale;
            grab.body.updateBoundingRadius();
          }
          ballEl.object3D.traverse(function(node) {
            if (node.isMesh && node.material) {
              node.material.transparent = true;
              node.material.opacity = 1.0;
            }
          });
          var lightChild2 = ballEl.querySelector('[light]');
          if (lightChild2) {
            var lc2 = lightChild2.components.light;
            if (lc2 && lc2.light) lc2.light.intensity = 1.5;
          }
        }
      }

      var _lastStatsSyncTime = 0;
      function sendStatsSync() {
        if (!isMultiplayer || window.isSpectator) return;
        var now = performance.now();
        if (now - _lastStatsSyncTime < 500) return;
        _lastStatsSyncTime = now;
        var msg = {
          type: 'stats-sync',
          stats: matchStats.player2,
          stage: playerStages.player2
        };
        if (isHost) {
          var opponentConn = getMatchOpponentConn();
          if (opponentConn && opponentConn.open) {
            opponentConn.send(msg);
          }
        } else if (conn && conn.open) {
          conn.send(msg);
        }
      }

      window.endMultiplayer = endMultiplayer;

      function cleanupMultiplayer() {
        for (var i = 0; i < connections.length; i++) {
          try { connections[i].conn.close(); } catch (e) {}
        }
        connections = [];
        if (conn) { try { conn.close(); } catch (e) {} }
        if (peer) { try { peer.destroy(); } catch (e) {} }
        conn = null;
        peer = null;
        multiplayerSlot = null;
        hasConnected = false;
      }

          this._updateBodyVisibility();
          console.log('[ArenaBots] Disabled');
        },

        setSlotHuman: function(slot, isHuman) {
          if (slot === 'blue') {
            var wasActive = this.blueBotActive;
            this.blueBotActive = !isHuman;
            if (isHuman) {
              this._updateBodyVisibility();
            } else if (!wasActive) {
              this._blueBotState = this._createBlueBotState();

        _tickBlueBot: function(time) {
          var s = this._blueBotState;
          if (!this._blueBall) {
            this._blueBall = document.querySelector('[simple-grab="player: player2"]');
          }
          if (!this._blueBall || !this._blueBall.components['simple-grab']) return;

          // Clear hit state after 1 second
          if (s.isHit && time - s.lastHitTime > 1000) {
            s.isHit = false;
          }

          this._blueBotDodge();
          this._checkBlueBotHit(time);

          if (!s.isHit && time - s.lastThrowTime > s.throwInterval) {
            this._blueBotThrow(time);
            s.lastThrowTime = time;
            s.throwInterval = 3000 + Math.random() * 2000;
          }

        _blueBotThrow: function(time) {
          var ball = this._blueBall;
          var grab = ball.components['simple-grab'];
          if (!grab || !grab.body) return;
          if (grab.isGrabbed) return;
          if (grab._respawnPhase) return;

          var distToSpawn = grab.body.position.distanceTo(grab.initialPosition);
          var ballSpeed = grab.body.velocity.length();
          if (distToSpawn > 1.5 && ballSpeed > 1) return;

          grab.resetPosition();
          grab._pendingAction = 'throw';
          if (grab.snapshotOpponentPos) grab.snapshotOpponentPos();

          var force = 8 + Math.random() * 7;

          var throwType = Math.random();
          var vx, vy, vz;
          if (throwType < 0.4) {
            // Direct throw with angular variation
            vx = (Math.random() - 0.5) * 0.35;
            vy = (Math.random() - 0.5) * 0.25;
            vz = -1;
          } else if (throwType < 0.7) {
            // Bounce throw — aim at wall/floor/ceiling
            var bounceChoice = Math.random();
            if (bounceChoice < 0.25) {
              vx = 0.6 + Math.random() * 0.3; vy = (Math.random() - 0.5) * 0.3; vz = -1;
            } else if (bounceChoice < 0.5) {
              vx = -(0.6 + Math.random() * 0.3); vy = (Math.random() - 0.5) * 0.3; vz = -1;
            } else if (bounceChoice < 0.75) {
              vx = (Math.random() - 0.5) * 0.3; vy = 0.5 + Math.random() * 0.3; vz = -1;
            } else {
              vx = (Math.random() - 0.5) * 0.3; vy = -(0.3 + Math.random() * 0.2); vz = -1;
            }
          } else {
            // Curve throw — offset lateral with spin
            var curveSide = Math.random() < 0.5 ? 1 : -1;
            vx = curveSide * (0.3 + Math.random() * 0.3);
            vy = (Math.random() - 0.5) * 0.2;
            vz = -1;
          }
          var mag = Math.sqrt(vx * vx + vy * vy + vz * vz);
          grab.body.velocity.set(
            (vx / mag) * force,
            (vy / mag) * force,
            (vz / mag) * force
          );
        },

        _checkBlueBotHit: function(time) {
          var s = this._blueBotState;
          if (s.isHit) return;
          if (!this._redBall) return;
          var grab = this._redBall.components['simple-grab'];
          if (!grab || !grab.body) return;
          if (grab.isReturning) return;
          if (grab._respawnPhase) return;

          var bp = grab.body.position;
          var bodyY = s.currentPos.y - 0.3;
          var dx = bp.x - s.currentPos.x;
          var dy = bp.y - bodyY;
          var dz = bp.z - s.currentPos.z;
          var horizDistSq = dx * dx + dz * dz;
          var speed = grab.body.velocity.length();

          if (horizDistSq < 0.6 * 0.6 && Math.abs(dy) < 0.9 && speed > 2) {
            s.isHit = true;
            s.lastHitTime = time;
            resetStage('player1');
            grab.isReturning = true;
            grab.returningStartTime = Date.now();
            grab.returningGraceUntil = Date.now() + 2000;
            grab.body.velocity.set(0, 0, 0);
            grab.body.angularVelocity.set(0, 0, 0);
            var sp = grab.initialPosition;
            var ddx = sp.x - bp.x, ddy = sp.y - bp.y, ddz = sp.z - bp.z;
            var dist = Math.sqrt(ddx * ddx + ddy * ddy + ddz * ddz);
            if (dist > 0.01) {
              grab.body.velocity.set((ddx / dist) * 10, (ddy / dist) * 10, (ddz / dist) * 10);
            } else {
              grab.resetPosition();
            }
          }
        },

        _blueBotDodge: function() {
          var s = this._blueBotState;
          if (!this._redBall) {
            this._redBall = document.querySelector('[simple-grab="player: player1"]');
          }
          if (!this._redBall || !this._redBall.components['simple-grab']) return;
          var grab = this._redBall.components['simple-grab'];
          if (!grab || !grab.body) return;

          var ballPos = grab.body.position;
          var ballVel = grab.body.velocity;
          var now = performance.now();

          switch (s.reactState) {
            case 'idle':
              if (grab.isGrabbed) break;
              var speed = Math.sqrt(ballVel.x * ballVel.x + ballVel.y * ballVel.y + ballVel.z * ballVel.z);
              if (ballVel.z > 2 && speed > 3 && ballPos.z < s.homePos.z - 2) {
                s.reactState = 'perceiving';
                s.reactStartTime = now;
                s.reactReactionDelay = 250 + Math.random() * 150;
              }
              break;

            case 'perceiving':
              if (now - s.reactStartTime < s.reactReactionDelay) break;
              var botZ = s.homePos.z;
              if (ballVel.z <= 1) { s.reactState = 'idle'; break; }
              var t = (botZ - ballPos.z) / ballVel.z;
              if (t < 0 || t > 3) { s.reactState = 'idle'; break; }
              var arrivalX = ballPos.x + ballVel.x * t + (Math.random() - 0.5) * 0.4;
              var arrivalY = ballPos.y + ballVel.y * t + (Math.random() - 0.5) * 0.2;

              var offsetX = arrivalX - s.homePos.x;
              var dodgeX = offsetX > 0 ? -0.5 : 0.5;
              if (Math.random() < 0.15) dodgeX = -dodgeX;

              var dodgeY = 0;
              if (arrivalY - s.homePos.y > 0.3) dodgeY = -0.25;
              else if (arrivalY - s.homePos.y < -0.3) dodgeY = 0.15;

              s.reactDodgeTarget.set(s.homePos.x + dodgeX, s.homePos.y + dodgeY, s.homePos.z);
              s.reactState = 'executing';
              s.reactExecuteStart = now;
              break;

            case 'executing':
              var execElapsed = now - s.reactExecuteStart;
              var execT = Math.min(1, execElapsed / 300);
              var easedT = execT * execT * (3 - 2 * execT);
              s.currentPos.lerpVectors(s.homePos, s.reactDodgeTarget, easedT);

              var ballPassed = ballPos.z > s.homePos.z + 1.5;
              var ballStopped = Math.sqrt(ballVel.x * ballVel.x + ballVel.y * ballVel.y + ballVel.z * ballVel.z) < 0.5;
              var ballReversed = ballVel.z < -0.5;
              if (ballPassed || ballStopped || ballReversed || execElapsed > 2000) {
                s.reactState = 'recovering';
                s.reactRecoverStart = now;
                s.reactRecoverFrom.copy(s.currentPos);
              }
              break;

            case 'recovering':
              var recElapsed = now - s.reactRecoverStart;
              var recT = Math.min(1, recElapsed / 500);
              var easedRecT = recT * recT * (3 - 2 * recT);
              s.currentPos.lerpVectors(s.reactRecoverFrom, s.homePos, easedRecT);
              if (recT >= 1) {
                s.currentPos.copy(s.homePos);
                s.reactState = 'idle';
              }
              break;
          }
        },

            const now = Date.now();

            if (!this.isReturning && this.body && !this.isGrabbed) {

                const cp = this.body.position;

            // Player1's red ball (bot's) deflected back at bot = point for human player
            // In multiplayer with human remote, skip — but allow when red arena bot is active or lobby bot match
            if (this.data.player === 'player1' && isBotTarget && canSelfHit) {
              if (isMultiplayer && !window.isLobbyBotMatch && !(arenaBotsPlaying && window.arenaBots.redBotActive)) return;
              recordStat('player2', 'hits');
              const gm = document.querySelector('#game-manager');

            // Player2's blue ball (human's) deflected back at player = point for bot

              recordStat('player1', 'hits');
              const gm = document.querySelector('#game-manager');
              if (gm && gm.components['game-manager']) gm.components['game-manager'].onPlayerHit();

            // Ball hits wall behind opponent - return to spawn at 10 m/s

                // Player1's red ball hits wall behind player (z=+8) = opponent wall for player1
                const hitOpponentWall = (this.data.player === 'player2' && isBackWallBehindBot) ||

                  this.body.angularVelocity.set(0, 0, 0);

                  const currentPos = this.body.position;

                  const dy = spawnPos.y - currentPos.y;

                  if (dist > 0.01) {

                    this.body.velocity.set(

                      (dy / dist) * speed,
                      (dz / dist) * speed

                // Ball hits its OWN back wall - respawn and reset stage
                // Player2's blue ball hits wall behind player (z=+8) = own back wall
                // Player1's red ball hits wall behind bot (z=-8) = own back wall
                if ((this.data.player === 'player2' && isBackWallBehindPlayer) ||
                    (this.data.player === 'player1' && isBackWallBehindBot)) {
                  respawn(this.data.player);
                  return;
                }
              }
            }
          });
        },
        
        snapshotOpponentPos: function() {
          const targetId = this.data.player === 'player2' ? '#bot-target' : '#player-target';
          const target = document.querySelector(targetId);
