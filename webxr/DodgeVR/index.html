<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DodgeVR</title>
    <meta name="description" content="Basic WebXR environment using A-Frame">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/aframe-glow-component@1.0.0/dist/aframe-glow-component.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="advanced-bot.js"></script>
    <script src="game-modes.js"></script>
    <script src="game-menu.js"></script>
    <script src="motion-recorder.js"></script>
    <script src="match-replay.js"></script>
    <style>
      /* Mobile Spectator UI */
      #mobile-spectator-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9999;
        font-family: 'Segoe UI', Arial, sans-serif;
        pointer-events: none;
      }
      #mobile-spectator-overlay.active { display: block; }
      #mobile-spectator-overlay * { pointer-events: auto; }

      /* Lobby join screen (shown before connecting) */
      #mobile-lobby-screen {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      #mobile-lobby-screen h1 {
        font-size: 2em;
        margin: 0 0 0.1em;
        letter-spacing: 0.05em;
        color: #4488ff;
      }
      #mobile-lobby-screen .subtitle {
        font-size: 0.9em;
        color: #999;
        margin-bottom: 1.5em;
      }
      #mobile-lobby-screen .lobby-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 1em;
      }
      #mobile-lobby-screen .lobby-row label {
        font-size: 1.1em;
        color: #ccc;
      }
      #mobile-lobby-screen .lobby-num-btn {
        width: 44px; height: 44px;
        border: none;
        border-radius: 8px;
        background: #333;
        color: #fff;
        font-size: 1.4em;
        cursor: pointer;
        touch-action: manipulation;
      }
      #mobile-lobby-screen .lobby-num-btn:active { background: #555; }
      #mobile-lobby-screen .lobby-num {
        font-size: 1.6em;
        min-width: 2em;
        text-align: center;
        color: #fff;
      }
      #mobile-lobby-screen .watch-btn {
        padding: 14px 48px;
        border: none;
        border-radius: 10px;
        background: #22aa44;
        color: #fff;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
        touch-action: manipulation;
        margin-top: 0.5em;
      }
      #mobile-lobby-screen .watch-btn:active { background: #1a8836; }
      #mobile-lobby-screen .watch-btn:disabled { background: #555; color: #999; }
      #mobile-lobby-screen .status-msg {
        margin-top: 1em;
        font-size: 0.95em;
        color: #ffcc00;
        min-height: 1.5em;
      }

      /* Match HUD (shown during spectating) */
      #mobile-match-hud {
        display: none;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
      }
      #mobile-match-hud.active { display: block; }

      #mobile-hud-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 8px 16px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      }
      #mobile-hud-scores {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.8em;
        font-weight: bold;
      }
      #mobile-hud-scores .blue-name,
      #mobile-hud-scores .red-name {
        font-size: 0.5em;
        font-weight: normal;
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #mobile-hud-scores .blue-side { color: #4499ff; text-align: right; }
      #mobile-hud-scores .red-side { color: #ff4444; text-align: left; }
      #mobile-hud-scores .score-sep { color: #888; font-size: 0.8em; }

      #mobile-hud-timer {
        position: absolute;
        top: 52px; left: 0; right: 0;
        text-align: center;
        font-size: 1em;
        color: #ffdd00;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }

      #mobile-hud-status {
        position: absolute;
        bottom: 12px; left: 0; right: 0;
        text-align: center;
        font-size: 0.9em;
        color: #aaa;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }

      /* Landscape prompt for portrait mode */
      #mobile-rotate-prompt {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        background: rgba(0,0,0,0.95);
        color: #fff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        text-align: center;
        padding: 20px;
      }
      #mobile-rotate-prompt .rotate-icon {
        font-size: 3em;
        margin-bottom: 16px;
        animation: rotateHint 2s ease-in-out infinite;
      }
      @keyframes rotateHint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }

      @media (orientation: portrait) {
        body.mobile-spectator #mobile-rotate-prompt { display: flex; }
      }
      @media (orientation: landscape) {
        body.mobile-spectator #mobile-rotate-prompt { display: none; }
      }
    </style>
  </head>
  <body>
    <script>
      // Game settings (adjustable at runtime via console)
      window.gameSettings = {
        trajectoryPreview: false,  // B button toggles; shows bounce path while holding ball
        trajectoryLocked: false   // Trigger+B freezes trajectory; stays visible after release
      };

      window.botMirrorMode = false;
      window.botRecordedMode = false;

      // Mobile spectator detection
      window.isMobileSpectator = false;
      function isMobileDevice() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) &&
               ('ontouchstart' in window || navigator.maxTouchPoints > 0);
      }

      // Physics world setup
      const world = new CANNON.World();
      world.gravity.set(0, 0, 0); // Zero gravity for the world
      world.broadphase = new CANNON.NaiveBroadphase();
      world.solver.iterations = 10;

      // Create materials
      const defaultMaterial = new CANNON.Material('default');
      const ballMaterial = new CANNON.Material('ball');
      const floorMaterial = new CANNON.Material('floor');
      const racketMaterial = new CANNON.Material('racket');
      const backWallMaterial = new CANNON.Material('backWall');

      // Create contact materials
      // Friction couples ball spin ↔ velocity on bounces (topspin kicks forward, etc.)
      const ballFloorContact = new CANNON.ContactMaterial(
        ballMaterial,
        floorMaterial,
        {
          friction: 0.5,
          restitution: 1.0
        }
      );
      world.addContactMaterial(ballFloorContact);

      // Ball vs. default (walls/ceiling) — same spin-friction coupling
      const ballDefaultContact = new CANNON.ContactMaterial(
        ballMaterial,
        defaultMaterial,
        {
          friction: 0.5,
          restitution: 1.0
        }
      );
      world.addContactMaterial(ballDefaultContact);

      // Add contact material for ball vs. ball
      const ballBallContact = new CANNON.ContactMaterial(
        ballMaterial,
        ballMaterial,
        {
          friction: 0.0,
          restitution: 1.0
        }
      );
      world.addContactMaterial(ballBallContact);

      // Add contact material for ball vs. racket (with friction for spin)
      const ballRacketContact = new CANNON.ContactMaterial(
        ballMaterial,
        racketMaterial,
        {
          friction: 0.8,  // Very high friction for spin transfer
          restitution: 0.85,  // Slightly less bouncy than walls
          contactEquationStiffness: 1e8,  // Stiffer contact for better spin transfer
          contactEquationRelaxation: 3    // Better contact resolution
        }
      );
      world.addContactMaterial(ballRacketContact);

      // Add contact material for ball vs. back walls (no bounce - should respawn)
      const ballBackWallContact = new CANNON.ContactMaterial(
        ballMaterial,
        backWallMaterial,
        {
          friction: 0.0,
          restitution: 0.0  // No bounce - ball should respawn instead
        }
      );
      world.addContactMaterial(ballBackWallContact);

      window.playBounceSound = function(position, speed) {
        var el = document.querySelector('#bounce-sound');
        if (!el) return;
        var sc = el.components.sound;
        if (!sc) return;
        el.object3D.position.copy(position);
        var normSpeed = Math.min((speed || 5) / 15, 1.0);
        var rate = 1.3 + normSpeed * 0.4 + (Math.random() - 0.5) * 0.3;
        var vol = 0.5 + normSpeed * 0.4;
        if (sc.pool && sc.pool.children) {
          for (var i = 0; i < sc.pool.children.length; i++) {
            var a = sc.pool.children[i];
            if (!a.isPlaying) {
              a.setPlaybackRate(rate);
              a.setVolume(vol);
            }
          }
        }
        sc.stopSound();
        sc.playSound();
      };

      // Add collision event handling to the physics world
      world.addEventListener('beginContact', function(event) {
        const bodyA = event.bodyA;
        const bodyB = event.bodyB;
        
        // Get the A-Frame entities associated with these bodies
        const entityA = bodyA.el;
        const entityB = event.bodyB.el;
        
        // Physics world collision detection (for ball-ball and ball-wall collisions)
        
        if (entityA && entityB) {
          // Check if either entity is a ball
          const isBallA = entityA.hasAttribute('simple-grab');
          const isBallB = entityB.hasAttribute('simple-grab');
          
          // If both are balls, play bounce sound at collision point + haptic on held ball
          if (isBallA && isBallB) {
            const collisionPoint = new THREE.Vector3();
            collisionPoint.addVectors(bodyA.position, bodyB.position).multiplyScalar(0.5);
            const relSpeed = new CANNON.Vec3();
            bodyA.velocity.vsub(bodyB.velocity, relSpeed);
            window.playBounceSound(collisionPoint, relSpeed.length());
            // Haptic feedback if one ball is held (blocking with held ball)
            const grabA = entityA.components?.['simple-grab'];
            const grabB = entityB.components?.['simple-grab'];
            if (grabA?.isGrabbed && grabA.grabbingHand) {
              pulseHaptic(grabA.grabbingHand, 0.7, 100);
            }
            if (grabB?.isGrabbed && grabB.grabbingHand) {
              pulseHaptic(grabB.grabbingHand, 0.7, 100);
            }
            // Count ball-on-ball block (debounced via _lastBallBlockTime on held ball)
            const aHeld = grabA?.isGrabbed;
            const bHeld = grabB?.isGrabbed;
            if (aHeld && !bHeld && grabA?.data?.player) {
              const bnow = performance.now();
              if (!grabA._lastBallBlockTime || bnow - grabA._lastBallBlockTime > 500) {
                grabA._lastBallBlockTime = bnow;
                recordStat(grabA.data.player, 'blocks');
              }
            } else if (bHeld && !aHeld && grabB?.data?.player) {
              const bnow = performance.now();
              if (!grabB._lastBallBlockTime || bnow - grabB._lastBallBlockTime > 500) {
                grabB._lastBallBlockTime = bnow;
                recordStat(grabB.data.player, 'blocks');
              }
            }
          }
          
          // Back wall handling is done via position check in simple-grab.tick()
          
          // Create and dispatch collision events for both entities
          const eventA = new CustomEvent('collision', {
            detail: { body: bodyB, bodyEl: entityB }
          });
          const eventB = new CustomEvent('collision', {
            detail: { body: bodyA, bodyEl: entityA }
          });
          
          entityA.dispatchEvent(eventA);
          entityB.dispatchEvent(eventB);
        }
      });

      // Add end contact event handling
      world.addEventListener('endContact', function(event) {
        const bodyA = event.bodyA;
        const bodyB = event.bodyB;
        
        // Check for racket-ball contact ending
        if (bodyA.isRacket) {
          bodyA.isInContact = false;
          bodyA.contactBall = null;
        }
        if (bodyB.isRacket) {
          bodyB.isInContact = false;
          bodyB.contactBall = null;
        }
      });

      // Game state
      const gameState = {
        score: { player1: 0, player2: 0 },
        timeRemaining: 120, // 2 minutes in seconds
        isPlaying: false,
        isReady: { player1: false, player2: false },
        ballSpawned: { player1: false, player2: false }
      };

      // Racket mode state - per hand tracking
      const racketMode = {
        player1: { left: false, right: false }, // Red player / opponent in multiplayer
        player2: { left: false, right: false }  // Blue player / local player
      };

      // Stage progression system — per-player
      // Advances when ball hits opponent's back wall; resets on any player/bot hit.
      const playerStages = window.playerStages = { player1: 1, player2: 1 };
      const STAGE_BASE_SPEED = 15;
      const STAGE_REF_SPEED = 45;
      const STAGE_REF_STAGE = 25;
      const STAGE_BASE_SCALE = 1.0;
      const STAGE_REF_SCALE = 2.0;
      const BALL_BASE_RADIUS = 0.1;

      const getStageMaxSpeed = window.getStageMaxSpeed = function(stage) {
        return STAGE_BASE_SPEED + (stage - 1) * (STAGE_REF_SPEED - STAGE_BASE_SPEED) / (STAGE_REF_STAGE - 1);
      };
      var getStageBallScale = window.getStageBallScale = function(stage) {
        return STAGE_BASE_SCALE + (stage - 1) * (STAGE_REF_SCALE - STAGE_BASE_SCALE) / (STAGE_REF_STAGE - 1);
      };
      function advanceStage(player) {
        if (!isMatchActive()) return;
        playerStages[player] = (playerStages[player] || 1) + 1;
        applyBallScale(player);
        if (window.matchRecorder && window.matchRecorder.isRecording) {
          window.matchRecorder.recordEvent('stage', { player: player, stage: playerStages[player] });
        }
        console.log('Stage up:', player, '→', playerStages[player],
          'maxSpd:', getStageMaxSpeed(playerStages[player]).toFixed(1),
          'scale:', getStageBallScale(playerStages[player]).toFixed(2));
      }
      function resetStage(player) {
        if (!isMatchActive()) return;
        if (playerStages[player] === 1) return;
        playerStages[player] = 1;
        applyBallScale(player);
        if (window.matchRecorder && window.matchRecorder.isRecording) {
          window.matchRecorder.recordEvent('stage', { player: player, stage: 1 });
        }
        console.log('Stage reset:', player, '→ 1');
      }
      function applyBallScale(player) {
        const scale = getStageBallScale(playerStages[player]);
        const selector = '[simple-grab="player: ' + player + '"]';
        const ballEl = document.querySelector(selector);
        if (!ballEl) return;
        ballEl.object3D.scale.setScalar(scale);
        const grab = ballEl.components['simple-grab'];
        if (grab && grab.body && grab.body.shapes[0]) {
          grab.body.shapes[0].radius = BALL_BASE_RADIUS * scale;
          grab.body.updateBoundingRadius();
        }
      }
      function capBallSpeed(player, body) {
        const maxSpd = getStageMaxSpeed(playerStages[player] || 1);
        const spd = body.velocity.length();
        if (spd > maxSpd) {
          const f = maxSpd / spd;
          body.velocity.x *= f;
          body.velocity.y *= f;
          body.velocity.z *= f;
        }
      }

      // Live match stats — per player
      const matchStats = window.matchStats = {
        player1: { throws: 0, hits: 0, blocks: 0, racketHits: 0, dodges: 0 },
        player2: { throws: 0, hits: 0, blocks: 0, racketHits: 0, dodges: 0 }
      };
      function resetMatchStats() {
        matchStats.player1 = { throws: 0, hits: 0, blocks: 0, racketHits: 0, dodges: 0 };
        matchStats.player2 = { throws: 0, hits: 0, blocks: 0, racketHits: 0, dodges: 0 };
      }
      function isMatchActive() {
        var gm = document.querySelector('#game-manager');
        var c = gm && gm.components['game-manager'];
        return c && (c.matchState === 'PLAYING' || c.matchState === 'OVERTIME');
      }
      function recordStat(player, stat) {
        if (!isMatchActive()) return;
        matchStats[player][stat]++;
      }

      // ---- Match History (localStorage) ----
      const MATCH_HISTORY_KEY = 'dodgevr-match-history';
      const MATCH_HISTORY_MAX = 10;

      function loadMatchHistory() {
        try {
          var raw = localStorage.getItem(MATCH_HISTORY_KEY);
          if (raw) {
            var data = JSON.parse(raw);
            return {
              single: Array.isArray(data.single) ? data.single : [],
              multi: Array.isArray(data.multi) ? data.multi : []
            };
          }
        } catch (e) { console.warn('Failed to load match history', e); }
        return { single: [], multi: [] };
      }

      function saveMatchToHistory(record) {
        var history = loadMatchHistory();
        var list = record.mode === 'multi' ? history.multi : history.single;
        list.unshift(record);
        if (list.length > MATCH_HISTORY_MAX) list.length = MATCH_HISTORY_MAX;
        try {
          localStorage.setItem(MATCH_HISTORY_KEY, JSON.stringify(history));
        } catch (e) { console.warn('Failed to save match history', e); }
      }

      function clearMatchHistory(mode) {
        var history = loadMatchHistory();
        if (mode === 'multi') history.multi = [];
        else history.single = [];
        try {
          localStorage.setItem(MATCH_HISTORY_KEY, JSON.stringify(history));
        } catch (e) { console.warn('Failed to clear match history', e); }
        // Prune associated replays from IndexedDB
        if (window.matchReplayStorage) {
          var keepTs = [];
          var remaining = history.single.concat(history.multi);
          for (var i = 0; i < remaining.length; i++) keepTs.push(remaining[i].timestamp);
          window.matchReplayStorage.pruneOld(keepTs);
        }
      }
      window.loadMatchHistory = loadMatchHistory;
      window.clearMatchHistory = clearMatchHistory;

      function _saveMatchHistoryFromState(gmComp, wasOvertime) {
        if (window.isSpectator) return;
        gmComp._historySaved = true;
        var sceneEl = gmComp.el.sceneEl;
        var bst = sceneEl.components['ball-speed-tracker'];
        var blueMax = bst ? bst.ballStats.player2.fastest : 0;
        var redMax = bst ? bst.ballStats.player1.fastest : 0;
        var ps = matchStats.player2;
        var os = matchStats.player1;
        var pAttempts = ps.throws + ps.racketHits;
        var oAttempts = os.throws + os.racketHits;
        var pAcc = pAttempts > 0 ? Math.round((ps.hits + os.dodges + os.blocks) / pAttempts * 100) : 0;
        var oAcc = oAttempts > 0 ? Math.round((os.hits + ps.dodges + ps.blocks) / oAttempts * 100) : 0;
        var durationSec = gmComp.matchStartTime ? Math.round((Date.now() - gmComp.matchStartTime) / 1000) : 0;
        var effectivelySingle = !isMultiplayer || window.isLobbyBotMatch;
        var pScore, oScore;
        if (!effectivelySingle) {
          pScore = multiplayerScore.local;
          oScore = multiplayerScore.remote;
        } else {
          pScore = gmComp.playerScore;
          oScore = gmComp.botScore;
        }
        var isWin = pScore > oScore;
        var opponentName = null;
        if (!effectivelySingle && lobbyState) {
          var mp = lobbyState.matchPlayers;
          var oppId = mp.blue === myPlayerId ? mp.red : mp.blue;
          for (var pi = 0; pi < lobbyState.players.length; pi++) {
            if (lobbyState.players[pi].id === oppId) { opponentName = lobbyState.players[pi].nickname; break; }
          }
        }
        var matchTs = Date.now();
        saveMatchToHistory({
          timestamp: matchTs,
          mode: effectivelySingle ? 'single' : 'multi',
          result: isWin ? 'WIN' : 'LOSS',
          playerScore: pScore,
          opponentScore: oScore,
          durationSeconds: durationSec,
          overtime: !!wasOvertime,
          player: {
            throws: ps.throws, racketHits: ps.racketHits, blocks: ps.blocks,
            dodges: ps.dodges, hits: ps.hits, accuracy: pAcc,
            maxSpeed: Math.round(blueMax * 10) / 10,
            finalStage: playerStages.player2 || 1
          },
          opponent: {
            throws: os.throws, racketHits: os.racketHits, blocks: os.blocks,
            dodges: os.dodges, hits: os.hits, accuracy: oAcc,
            maxSpeed: Math.round(redMax * 10) / 10,
            finalStage: playerStages.player1 || 1
          },
          botMode: effectivelySingle ? (window.botMirrorMode ? 'MIRRORED' : (window.botRecordedMode ? 'RECORDED' : 'NORMAL')) : null,
          opponentName: effectivelySingle ? null : opponentName
        });

        // Save match replay recording linked to the same timestamp
        if (window.matchRecorder && window.matchRecorder.isRecording) {
          var replay = window.matchRecorder.stopRecording();
          if (replay && window.matchReplayStorage) {
            replay.matchTimestamp = matchTs;
            window.matchReplayStorage.save(replay).then(function () {
              console.log('[MatchReplay] Replay saved for match', matchTs);
              // Prune replays not in current match history
              var hist = loadMatchHistory();
              var keepTs = [];
              var all = hist.single.concat(hist.multi);
              for (var ri = 0; ri < all.length; ri++) keepTs.push(all[ri].timestamp);
              window.matchReplayStorage.pruneOld(keepTs);
            }).catch(function (e) {
              console.warn('[MatchReplay] Failed to save replay:', e);
            });
          }
        }
      }

      // Multiplayer state (star topology: host + up to 3 peers)
      let isMultiplayer = false;
      let isHost = false;
      window.isLobbyBotMatch = false;
      let peer = null;
      let conn = null;                    // Peer's connection to host
      let connections = [];               // Host's array of { conn, peerId, nickname }
      let lobbyState = null;              // Authoritative on host, synced to peers
      let myPlayerId = null;
      let multiplayerSlot = null;
      let multiplayerStatus = 'Singleplayer';
      let hasConnected = false;
      const MAX_LOBBIES = 10;
      let multiplayerStartType = 'dodgeball';
      let sessionID = null;
      let connectionState = 'disconnected';
      window.connectionState = 'disconnected';
      let lastMultiplayerToggle = 0;
      let remotePlayerState = null;
      let remoteBallState = null;
      let multiplayerCleanup = null;
      let isSearchingForMatch = false;

      // Spectator rendering state — uses maps keyed by peerId for robustness
      let spectatorPlayerStates = {};   // { peerId: state }
      let spectatorBallStates = {};     // { peerId: state }
      let spectatorMatchBlueId = null;
      let spectatorMatchRedId = null;
      let spectatorMatchActive = false;
      let spectatorMatchStartTime = 0;
      let _spectatorLogOnce = false;

      // Expose state for game-menu.js
      window.isMultiplayer = false;
      window.isHost = false;
      window.isSpectator = false;
      window.lobbyState = null;
      window.myPlayerId = null;

      function syncWindowState() {
        window.isMultiplayer = isMultiplayer;
        window.isHost = isHost;
        window.lobbyState = lobbyState;
        window.myPlayerId = myPlayerId;
        window.connections = connections;
        window.broadcastLobbyState = broadcastLobbyState;
      }

      function updateOpponentNickname() {
        var nicknameEl = document.getElementById('opponent-nickname');
        if (!nicknameEl) return;
        if (!isMultiplayer || !lobbyState) {
          nicknameEl.setAttribute('visible', false);
          return;
        }
        var mp = lobbyState.matchPlayers;
        var opponentId = null;
        if (mp.blue === myPlayerId) opponentId = mp.red;
        else if (mp.red === myPlayerId) opponentId = mp.blue;
        if (!opponentId) {
          nicknameEl.setAttribute('visible', false);
          return;
        }
        if (opponentId === '__BOT__') {
          nicknameEl.setAttribute('text', 'value', 'Bot');
          nicknameEl.setAttribute('visible', true);
          return;
        }
        var name = '';
        for (var i = 0; i < lobbyState.players.length; i++) {
          if (lobbyState.players[i].id === opponentId) { name = lobbyState.players[i].nickname; break; }
        }
        if (name) {
          nicknameEl.setAttribute('text', 'value', name);
          nicknameEl.setAttribute('visible', true);
        } else {
          nicknameEl.setAttribute('visible', false);
        }
      }

      // Helper: update mode display

      // B button toggles trajectory preview; grip toggles rackets
      AFRAME.registerComponent('multiplayer-toggle', {
        init: function() {
          this.lastModeSwitch = 0;

          // Listen for B button to toggle trajectory preview
          this._trajNotifyTimeout = null;

          this.el.sceneEl.addEventListener('bbuttondown', () => {
            const now = Date.now();
            if (now - this.lastModeSwitch < 500) return;
            this.lastModeSwitch = now;

            this.toggleTrajectory();
          });

          // Listen for grip button presses for individual racket control
          this.el.sceneEl.addEventListener('gripdown', (evt) => {
            const hand = evt.target;
            this.handleGripDown(hand);
          });
          
          this.el.sceneEl.addEventListener('gripup', (evt) => {
            const hand = evt.target;
            this.handleGripUp(hand);
          });
        },
        
        handleGripDown: function(hand) {
          const isLeftHand = hand.id === 'leftHand';
          const isRightHand = hand.id === 'rightHand';
          
          if (isLeftHand) {
            this.setRacketVisible('left', true);
          } else if (isRightHand) {
            this.setRacketVisible('right', true);
          }
        },
        
        handleGripUp: function(hand) {
          const isLeftHand = hand.id === 'leftHand';
          const isRightHand = hand.id === 'rightHand';
          
          if (isLeftHand) {
            this.setRacketVisible('left', false);
          } else if (isRightHand) {
            this.setRacketVisible('right', false);
          }
        },
        
        setRacketVisible: function(handSide, visible) {
          // Local player is always player2
          racketMode.player2[handSide] = visible;
          if (window.matchRecorder && window.matchRecorder.isRecording) {
            window.matchRecorder.recordEvent('racket', { player: 'player2', hand: handSide, active: visible });
          }
          
          // Get the appropriate racket element
          const racketId = handSide === 'left' ? '#leftHandRacket' : '#rightHandRacket';
          const racket = document.querySelector(racketId);
          
          if (racket) {
            racket.setAttribute('visible', visible);
            console.log(`${handSide} racket ${visible ? 'activated' : 'deactivated'}`);
          }
          
          // Send racket state to opponent in multiplayer
          if (isMultiplayer) {
            sendToMatchOpponent({ 
              type: 'racket-mode', 
              player: 'player2', 
              hand: handSide, 
              active: visible 
            });
          }
        },

        toggleTrajectory: function() {
          const gs = window.gameSettings;
          const blueBall = document.querySelector('[simple-grab="player: player2"]');
          const holding = blueBall && blueBall.components['simple-grab'] && blueBall.components['simple-grab'].isGrabbed;

          if (holding && gs.trajectoryPreview) {
            // Trigger+B while trajectory is live: toggle lock
            gs.trajectoryLocked = !gs.trajectoryLocked;
            const label = gs.trajectoryLocked ? 'LOCKED' : 'LIVE';
            this.showTrajectoryNotification(label);
            console.log('Trajectory: ' + label);
          } else {
            // B only: toggle trajectory on/off
            gs.trajectoryPreview = !gs.trajectoryPreview;
            gs.trajectoryLocked = false;
            const label = gs.trajectoryPreview ? 'ON' : 'OFF';
            this.showTrajectoryNotification(label);
            console.log('Trajectory preview: ' + label);
          }
        },

        showTrajectoryNotification: function(label) {
          if (!this._trajDisplay) {
            this._trajDisplay = document.createElement('a-entity');
            this._trajDisplay.setAttribute('position', '0 2.4 0');
            this._trajDisplay.setAttribute('text', {
              value: '',
              align: 'center',
              width: 2,
              color: '#00ffff'
            });
            this.el.sceneEl.appendChild(this._trajDisplay);
          }

          this._trajDisplay.setAttribute('text', 'value', 'Trajectory: ' + label);
          this._trajDisplay.setAttribute('visible', true);

          if (this._trajNotifyTimeout) clearTimeout(this._trajNotifyTimeout);
          this._trajNotifyTimeout = setTimeout(() => {
            this._trajDisplay.setAttribute('visible', false);
          }, 2000);
        },

        switchGameMode: function() {
          const scene = this.el.sceneEl;
          const gameModesComponent = scene.components['game-modes'];
          
          if (!gameModesComponent) {
            console.log('Game modes component not found');
            return;
          }
          
          // Get current mode
          const currentMode = gameModesComponent.data.mode;
          const isEnabled = gameModesComponent.data.enabled;
          
          // Toggle between default and bouncing-ball modes
          let newMode, newEnabled;
          if (!isEnabled || currentMode === 'default') {
            newMode = 'bouncing-ball';
            newEnabled = true;
          } else {
            newMode = 'default';
            newEnabled = false;
          }
          
          // Apply mode change locally
          this.applyModeChange(newMode, newEnabled);
          
          // Send mode change to all peers in multiplayer
          if (isMultiplayer) {
            sendToMatchOpponent({
              type: 'mode-change',
              mode: newMode,
              enabled: newEnabled
            });
          }
          
          console.log(`Mode switched to: ${newEnabled ? newMode : 'default (disabled)'}`);
        },

        applyModeChange: function(mode, enabled) {
          const scene = this.el.sceneEl;
          const gameModesComponent = scene.components['game-modes'];
          
          if (gameModesComponent) {
            // Remove current mode if any
            if (gameModesComponent.data.enabled) {
              gameModesComponent.remove();
            }
            
            // Apply new mode
            scene.setAttribute('game-modes', `enabled: ${enabled}; mode: ${mode}`);
            
            // Update mode display
            updateModeDisplay(mode, enabled);
          }
        }
      });

      async function connectToLobby(lobbyNum) {
