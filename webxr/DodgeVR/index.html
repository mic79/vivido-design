        _setBallOpacity: function(opacity) {
          this.el.object3D.traverse(function(node) {
            if (node.isMesh && node.material) {
              node.material.transparent = true;
              node.material.opacity = opacity;
            }
          });
          // Also fade the point light
          var lightEl = this.el.querySelector('[light]');
          if (lightEl) {
            var lightComp = lightEl.components.light;
            if (lightComp && lightComp.light) {
              lightComp.light.intensity = 1.5 * opacity;
            }
          }
        },

        animatedRespawn: function(resetStageForPlayer) {
          if (this._respawnPhase) return; // already animating
          if (window.matchRecorder && window.matchRecorder.isRecording) {
            window.matchRecorder.recordEvent('respawn', {
              player: this.data.player,
              resetStage: resetStageForPlayer || null
            });
          }
          this._respawnPhase = 'fade-out';
          this._respawnStart = performance.now();
          this._respawnBaseScale = getStageBallScale(playerStages[this.data.player] || 1);
          this._respawnResetStagePending = resetStageForPlayer || null;

          // Release any grab constraints
          if (this.constraint) {
            world.removeConstraint(this.constraint);
            this.constraint = null;
          }
          if (this.handBody) {
            world.removeBody(this.handBody);
            this.handBody = null;
          }
          this.isGrabbed = false;
          this.grabbingHand = null;
          this.body.mass = 1;
          this.body.updateMassProperties();

          // Fade out in place: keep a short drift from current velocity then decelerate
          this._respawnP0 = new CANNON.Vec3().copy(this.body.position);
          var vel = this.body.velocity;
          var speed = vel.length();
          var driftDist = Math.min(speed * 0.15, 1.0);
          if (speed > 0.5) {
            this._respawnDrift = new CANNON.Vec3(
              vel.x / speed * driftDist,
              vel.y / speed * driftDist,
              vel.z / speed * driftDist
            );
          } else {
            this._respawnDrift = new CANNON.Vec3(0, 0, 0);
          }

          // Kill physics — we drive position manually
          this.body.velocity.set(0, 0, 0);
          this.body.angularVelocity.set(0, 0, 0);
          this.body.gravity.set(0, 0, 0);

          // Disable collisions during respawn
          this.body.collisionFilterGroup = 0;
          this.body.collisionFilterMask = 0;
        },

        _tickRespawnAnimation: function() {
          var now = performance.now();
          var elapsed = now - this._respawnStart;

          if (this._respawnPhase === 'fade-out') {
            var t = Math.min(elapsed / this._respawnFadeOutDur, 1.0);

            // Drift: ball coasts forward slightly then decelerates (ease-out drift)
            var driftT = 1.0 - (1.0 - t) * (1.0 - t); // ease-out
            var px = this._respawnP0.x + this._respawnDrift.x * driftT;
            var py = this._respawnP0.y + this._respawnDrift.y * driftT;
            var pz = this._respawnP0.z + this._respawnDrift.z * driftT;
            this.body.position.set(px, py, pz);
            this.el.object3D.position.set(px, py, pz);

            // Shrink and fade (min 0.5 scale = 5cm radius to prevent wall clipping)
            var ease = t * t;
            var scale = this._respawnBaseScale * (1.0 - ease);
            if (scale < 0.5) scale = 0.5;
            this.el.object3D.scale.setScalar(scale);
            if (this.body.shapes[0]) {
              this.body.shapes[0].radius = BALL_BASE_RADIUS * scale;
              this.body.updateBoundingRadius();
            }
            this._setBallOpacity(1.0 - ease);

            if (t >= 1.0) {
              // Fade-out complete: ball has arrived at spawn and is invisible
              if (this._respawnResetStagePending) {
                resetStage(this._respawnResetStagePending);
              }
              this._respawnBaseScale = getStageBallScale(playerStages[this.data.player] || 1);
              this.isReturning = false;
              this.returningGraceUntil = 0;
              this._throwOpponentPos = null;
              this._dodgeAimed = null;
              this._pendingAction = null;
              this.body.position.copy(this.initialPosition);
              this.body.velocity.set(0, 0, 0);
              this.body.angularVelocity.set(0, 0, 0);
              this.body.quaternion.set(0, 0, 0, 1);
              this.body.gravity.copy(new CANNON.Vec3(0, 0, 0));
              this._releaseTime = Date.now();

              // Sync visual to spawn
              this.el.object3D.position.copy(this.initialPosition);

              // Start fade-in
              this._respawnPhase = 'fade-in';
              this._respawnStart = now;
              this.el.object3D.scale.setScalar(0.5);
              this._setBallOpacity(0);
            }
          } else if (this._respawnPhase === 'fade-in') {
            // Keep visual at spawn
            this.el.object3D.position.copy(this.initialPosition);

            var t2 = Math.min(elapsed / this._respawnFadeInDur, 1.0);
            var ease2 = 1.0 - (1.0 - t2) * (1.0 - t2); // ease-out
            var scale2 = 0.5 + (this._respawnBaseScale - 0.5) * ease2;
            this.el.object3D.scale.setScalar(scale2);
            if (this.body.shapes[0]) {
              this.body.shapes[0].radius = BALL_BASE_RADIUS * scale2;
              this.body.updateBoundingRadius();
            }
            this._setBallOpacity(ease2);

            if (t2 >= 1.0) {
              // Animation complete - restore full state
              this._respawnPhase = null;
              this.el.object3D.scale.setScalar(this._respawnBaseScale);
              if (this.body.shapes[0]) {
                this.body.shapes[0].radius = BALL_BASE_RADIUS * this._respawnBaseScale;
                this.body.updateBoundingRadius();
              }
              this._setBallOpacity(1.0);
              this.body.collisionFilterGroup = 1;
              this.body.collisionFilterMask = 1;
            }
          }
        },

        resetPosition: function() {
          // Cancel any in-progress respawn animation
          if (this._respawnPhase) {
            this._respawnPhase = null;
          }
          this.isReturning = false;
          this.returningGraceUntil = 0;
          this._throwOpponentPos = null;
          this._dodgeAimed = null;
          this._pendingAction = null;
          if (this.constraint) {
            world.removeConstraint(this.constraint);
            this.constraint = null;
          }
          if (this.handBody) {
            world.removeBody(this.handBody);
            this.handBody = null;
          }
          this.body.position.copy(this.initialPosition);
          this.body.velocity.set(0, 0, 0);
          this.body.angularVelocity.set(0, 0, 0);
          this.body.quaternion.set(0, 0, 0, 1);
          this.body.gravity.copy(new CANNON.Vec3(0, 0, 0));
          // Restore normal mass in case ball was grabbed
          this.body.mass = 1;
          this.body.updateMassProperties();
          this.isGrabbed = false;
          this.grabbingHand = null;
          this._releaseTime = Date.now();
          // Restore visuals (opacity, scale, collision) in case animation was interrupted
          this._setBallOpacity(1.0);
          var fullScale = getStageBallScale(playerStages[this.data.player] || 1);
          this.el.object3D.scale.setScalar(fullScale);

              const b2 = document.querySelector('[simple-grab="player: player2"]');
              if (b1?.components['simple-grab']?.body && b2?.components['simple-grab']?.body) {
                this.ballBodies = {
                  a: b1.components['simple-grab'].body,
                  b: b2.components['simple-grab'].body
                };
              }
            }

            // Store pre-step ball positions for racket CCD (before physics moves them)
            if (this.ballBodies) {
              const ba = this.ballBodies.a;
              const bb = this.ballBodies.b;
              preStepBallPositions.player1.set(ba.position.x, ba.position.y, ba.position.z);
              preStepBallPositions.player2.set(bb.position.x, bb.position.y, bb.position.z);
            }

            // Pre-step CCD: detect ball-ball tunneling before CANNON substeps
            if (this.ballBodies) {
              checkBallBallCCD(this.ballBodies.a, this.ballBodies.b, deltaTime);
            }

            // Snapshot velocities AFTER CCD but BEFORE solver — so only Cannon.js
            // solver changes (wall bounces) are detected, not ball-ball CCD
            if (this.ballBodies) {
              this._preVelA.copy(this.ballBodies.a.velocity);
              this._preVelB.copy(this.ballBodies.b.velocity);
            }

            const maxStep = 1/240;
            const steps = Math.ceil(deltaTime / maxStep);
            const clampedSteps = Math.min(steps, 8);
            const clampedStepSize = deltaTime / clampedSteps;
            
            for (let i = 0; i < clampedSteps; i++) {
              world.step(clampedStepSize);
            }

            // After solver: transfer ball spin into velocity on wall bounces
            if (this.ballBodies) {
              this._checkSpinBounce(this.ballBodies.a, this._preVelA);
              this._checkSpinBounce(this.ballBodies.b, this._preVelB);
            }
          }
          this.lastTime = time;
        },

        // Detect wall bounces via velocity-component sign flips, then convert
        // the ball's spin into a tangential kick (topspin → forward, etc.).
        _checkSpinBounce: function(body, preVel) {
          const grab = body.el?.components?.['simple-grab'];
          if (grab?.isGrabbed) return;

          const av = body.angularVelocity;
          const angSq = av.x * av.x + av.y * av.y + av.z * av.z;
          if (angSq < 0.25) return;  // < 0.5 rad/s — negligible spin

          const R  = body.shapes[0] ? body.shapes[0].radius : 0.1;
          const v  = body.velocity;
          const p  = body.position;
          const threshold = 0.3;  // min speed to count as a bounce flip
          const margin = 0.6;     // position margin from wall surface

          // Floor: vy flipped negative→positive, ball near y=0
          if (preVel.y < -threshold && v.y > threshold && p.y < R + margin)
            this._applySpinKick(body, 0, 1, 0, R, 'floor');
          // Ceiling: vy flipped positive→negative, ball near y=4
          else if (preVel.y > threshold && v.y < -threshold && p.y > 4 - R - margin)
            this._applySpinKick(body, 0, -1, 0, R, 'ceiling');

          // Left wall: vx flipped negative→positive, ball near x=-2
          if (preVel.x < -threshold && v.x > threshold && p.x < -2 + R + margin)
            this._applySpinKick(body, 1, 0, 0, R, 'left wall');
          // Right wall: vx flipped positive→negative, ball near x=2
          else if (preVel.x > threshold && v.x < -threshold && p.x > 2 - R - margin)
            this._applySpinKick(body, -1, 0, 0, R, 'right wall');
        },

        // Apply friction-based spin→velocity transfer for one wall normal axis.
        _applySpinKick: function(body, nx, ny, nz, R, wallName) {
          const av = body.angularVelocity;

          // Contact-point offset: r = -n * R (point on ball nearest the wall)
          const rx = -nx * R, ry = -ny * R, rz = -nz * R;

          // Surface velocity from spin at contact: v_spin = ω × r
          const vsx = av.y * rz - av.z * ry;
          const vsy = av.z * rx - av.x * rz;
          const vsz = av.x * ry - av.y * rx;

          // Keep only tangential component (parallel to wall)
          const dot = vsx * nx + vsy * ny + vsz * nz;
          const vtx = vsx - dot * nx;
          const vty = vsy - dot * ny;
          const vtz = vsz - dot * nz;

          const kickMag = Math.sqrt(vtx * vtx + vty * vty + vtz * vtz);
          if (kickMag < 0.01) return;

          // Friction opposes the spin surface velocity → subtract
          const transfer = 1.2;
          body.velocity.x -= vtx * transfer;
          body.velocity.y -= vty * transfer;
          body.velocity.z -= vtz * transfer;

          // Spin is partially consumed by friction on each wall bounce
          av.x *= 0.7;
          av.y *= 0.7;
          av.z *= 0.7;

          console.log('Spin bounce off', wallName,
            '| spin:', Math.sqrt(av.x*av.x + av.y*av.y + av.z*av.z).toFixed(1), 'rad/s',
            '| kick:', kickMag.toFixed(2), 'm/s',
            '| vel:', body.velocity.length().toFixed(1), 'm/s');
        }
      });

        applyWireframe: function() {

      // Ball trail component - performant ribbon trails showing speed, direction, spin
      AFRAME.registerComponent('ball-trail', {
        schema: {
          color: { type: 'color', default: '#ffffff' },
          centerWidth: { type: 'number', default: 0.03 },
          sideWidth: { type: 'number', default: 0.01 },
          sideOffset: { type: 'number', default: 0.1 },
          maxSegments: { type: 'number', default: 40 }
        },

        init: function() {
          this.maxSeg = this.data.maxSegments;
          // Ring buffer for position history
          this.positions = [];
          this.headIndex = 0;
          this.filledCount = 0;
          // Reusable vectors
          this._pos = new THREE.Vector3();
          this._vel = new THREE.Vector3();
          this._angVel = new THREE.Vector3();
          this._camPos = new THREE.Vector3();
          this._dir = new THREE.Vector3();
          this._side = new THREE.Vector3();
          this._up = new THREE.Vector3(0, 1, 0);
          this._spinAxis = new THREE.Vector3();
          this._offsetL = new THREE.Vector3();
          this._offsetR = new THREE.Vector3();
          this._right = new THREE.Vector3(1, 0, 0);
          this._quat = new THREE.Quaternion();

          // Pre-allocate position ring buffer
          for (let i = 0; i < this.maxSeg; i++) {
            this.positions.push(new THREE.Vector3());
          }

          // Create 3 ribbon trails
          const color = new THREE.Color(this.data.color);
          this.trails = [];
          const configs = [
            { width: this.data.centerWidth, offsetType: 'center', opacity: 0.9 },
            { width: this.data.sideWidth, offsetType: 'left', opacity: 0.6 },
            { width: this.data.sideWidth, offsetType: 'right', opacity: 0.6 }
          ];

          configs.forEach((cfg) => {
            const maxVerts = (this.maxSeg + 1) * 2;
            const maxIndices = this.maxSeg * 6;

            const posAttr = new THREE.BufferAttribute(new Float32Array(maxVerts * 3), 3);
            posAttr.setUsage(THREE.DynamicDrawUsage);
            const alphaAttr = new THREE.BufferAttribute(new Float32Array(maxVerts), 1);
            alphaAttr.setUsage(THREE.DynamicDrawUsage);

            const indices = new Uint16Array(maxIndices);
            for (let i = 0; i < this.maxSeg; i++) {
              const base = i * 2;
              const idx = i * 6;
              indices[idx]     = base;
              indices[idx + 1] = base + 1;
              indices[idx + 2] = base + 2;
              indices[idx + 3] = base + 1;
              indices[idx + 4] = base + 3;
              indices[idx + 5] = base + 2;
            }

            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', posAttr);
            geom.setAttribute('alpha', alphaAttr);
            geom.setIndex(new THREE.BufferAttribute(indices, 1));
            geom.setDrawRange(0, 0); // Start with nothing drawn

            const mat = new THREE.ShaderMaterial({
              uniforms: {
                uColor: { value: color },
                uBaseOpacity: { value: cfg.opacity }
              },
              vertexShader: `
                attribute float alpha;
                varying float vAlpha;
                void main() {
                  vAlpha = alpha;
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
              `,
              fragmentShader: `
                uniform vec3 uColor;
                uniform float uBaseOpacity;
                varying float vAlpha;
                void main() {
                  gl_FragColor = vec4(uColor, uBaseOpacity * vAlpha);
                }
              `,
              transparent: true,
              depthWrite: false,
              side: THREE.DoubleSide,
              blending: THREE.AdditiveBlending
            });

            const mesh = new THREE.Mesh(geom, mat);
            mesh.frustumCulled = false;
            mesh.renderOrder = 1;
            this.el.sceneEl.object3D.add(mesh);

            this.trails.push({
              mesh: mesh,
              geom: geom,
              posAttr: posAttr,
              alphaAttr: alphaAttr,
              width: cfg.width,
              offsetType: cfg.offsetType
            });
          });

          this.spinAngle = 0; // Accumulated spin for side trail spiral
        },

        tick: function(time, dt) {
          const grab = this.el.components['simple-grab'];
          if (!grab || !grab.body) return;

          const body = grab.body;
          const dtSec = Math.max((dt || 16) / 1000, 0.001);

          // Get ball world position
          this.el.object3D.getWorldPosition(this._pos);

          // Only push to ring buffer if position actually changed (avoids
          // duplicate entries on spectators where position updates come from
          // the network and may skip frames)
          var lastIdx = ((this.headIndex - 1) + this.maxSeg) % this.maxSeg;
          if (this.filledCount === 0 || this._pos.distanceToSquared(this.positions[lastIdx]) > 0.000001) {
            this.positions[this.headIndex].copy(this._pos);
            this.headIndex = (this.headIndex + 1) % this.maxSeg;
            if (this.filledCount < this.maxSeg) this.filledCount++;
          }

          // Compute velocity from position deltas — works for grabbed, thrown,
          // and spectator-driven balls (body.velocity is zeroed while grabbed)
          if (this.filledCount >= 2) {
            const curIdx = ((this.headIndex - 1) + this.maxSeg) % this.maxSeg;
            const prevIdx = ((this.headIndex - 2) + this.maxSeg) % this.maxSeg;
            this._vel.subVectors(this.positions[curIdx], this.positions[prevIdx]).divideScalar(dtSec);
          } else {
            this._vel.set(0, 0, 0);
          }
          var speed = this._vel.length();

          // Fallback to body.velocity for spectator-driven balls where position
          // may not update every frame but velocity data is available
          if (speed < 0.3 || speed > 50) {
            var bv = body.velocity;
            var bodySpeed = Math.sqrt(bv.x * bv.x + bv.y * bv.y + bv.z * bv.z);
            if (bodySpeed >= 0.3 && bodySpeed < 50) {
              this._vel.set(bv.x, bv.y, bv.z);
              speed = bodySpeed;
            }
          }

          // Ignore teleportation spikes (position resets, respawns)
          if (speed > 50) {
            this.trails.forEach(t => t.geom.setDrawRange(0, 0));
            this.filledCount = 0;
            this.headIndex = 0;
            return;
          }

          // Speed-based visible length: faster = more segments
          const visibleCount = Math.min(
            Math.max(Math.floor(speed * 4), 2),
            this.filledCount
          );

          // Hide trails if essentially stationary
          if (speed < 0.3) {
            this.trails.forEach(t => t.geom.setDrawRange(0, 0));
            return;
          }

          // Get angular velocity for spin (use physics value when available)
          this._angVel.set(body.angularVelocity.x, body.angularVelocity.y, body.angularVelocity.z);
          const spinSpeed = this._angVel.length();

          // Accumulate spin angle for spiral
          if (spinSpeed > 0.5) {
            this.spinAngle += spinSpeed * dtSec;
          }

          // Get camera position for billboard facing
          const cam = this.el.sceneEl.camera;
          if (cam) cam.getWorldPosition(this._camPos);

          // Build ribbons
          for (let t = 0; t < this.trails.length; t++) {
            const trail = this.trails[t];
            const posArr = trail.posAttr.array;
            const alphaArr = trail.alphaAttr.array;
            const halfW = trail.width * 0.5;
            let vertIdx = 0;

            for (let i = 0; i < visibleCount; i++) {
              // Walk backwards from most recent
              const bufIdx = ((this.headIndex - 1 - i) + this.maxSeg * 2) % this.maxSeg;
              const p = this.positions[bufIdx];

              // Get direction for this segment
              if (i < visibleCount - 1) {
                const nextBufIdx = ((this.headIndex - 2 - i) + this.maxSeg * 2) % this.maxSeg;
                this._dir.subVectors(p, this.positions[nextBufIdx]).normalize();
              }
              // else keep previous dir

              // Apply side offset for left/right trails (with spin spiral)
              let offsetX = 0, offsetY = 0, offsetZ = 0;
              if (trail.offsetType !== 'center') {
                const sideSign = trail.offsetType === 'left' ? -1 : 1;
                const angle = this.spinAngle + (i * 0.15 * (spinSpeed > 0.5 ? 1 : 0));

                // Create perpendicular offset, rotated by spin
                if (this._vel.length() > 0.01) {
                  this._spinAxis.copy(this._vel).normalize();
                } else {
                  this._spinAxis.set(0, 0, 1);
                }
                // Get a perpendicular vector
                if (Math.abs(this._spinAxis.y) < 0.99) {
                  this._offsetL.crossVectors(this._spinAxis, this._up).normalize();
                } else {
                  this._offsetL.crossVectors(this._spinAxis, this._right).normalize();
                }
                this._offsetR.crossVectors(this._spinAxis, this._offsetL).normalize();

                const sOff = this.data.sideOffset;
                offsetX = (this._offsetL.x * Math.cos(angle) + this._offsetR.x * Math.sin(angle)) * sOff * sideSign;
                offsetY = (this._offsetL.y * Math.cos(angle) + this._offsetR.y * Math.sin(angle)) * sOff * sideSign;
                offsetZ = (this._offsetL.z * Math.cos(angle) + this._offsetR.z * Math.sin(angle)) * sOff * sideSign;
              }

              const px = p.x + offsetX;
              const py = p.y + offsetY;
              const pz = p.z + offsetZ;

              // Billboard: perpendicular to both trail dir and view dir
              this._side.subVectors(this._camPos, p);
              this._side.crossVectors(this._dir, this._side).normalize().multiplyScalar(halfW);

              // Two vertices per position (left/right of ribbon center)
              const vi = vertIdx * 3;
              posArr[vi]     = px - this._side.x;
              posArr[vi + 1] = py - this._side.y;
              posArr[vi + 2] = pz - this._side.z;
              posArr[vi + 3] = px + this._side.x;
              posArr[vi + 4] = py + this._side.y;
              posArr[vi + 5] = pz + this._side.z;

              // Alpha fades from 1 at head to 0 at tail
              const alpha = 1.0 - (i / visibleCount);
              alphaArr[vertIdx] = alpha;
              alphaArr[vertIdx + 1] = alpha;

              vertIdx += 2;
            }

            trail.posAttr.needsUpdate = true;
            trail.alphaAttr.needsUpdate = true;
            trail.geom.setDrawRange(0, Math.max(0, (visibleCount - 1)) * 6);
          }
        },

        remove: function() {
          this.trails.forEach(t => {
            t.mesh.parent.remove(t.mesh);
            t.geom.dispose();
            t.mesh.material.dispose();
          });
        }
      });

      // Add sound manager component
      AFRAME.registerComponent('sound-manager', {
        init: function() {
          this.ballSounds = [];
          this.soundsInitialized = false;
          this._fadeTickers = {};
          
          // Get all ball sounds
          this.el.sceneEl.querySelectorAll('[simple-grab]').forEach(ball => {
            const sound = ball.querySelector('[sound]');
            if (sound) {
              this.ballSounds.push(sound);
              // Initially pause all sounds
              sound.components.sound.pauseSound();
            }
          });
          
          // Get bounce sound
          this.bounceSound = this.el.sceneEl.querySelector('#bounce-sound');
          if (this.bounceSound) {
            this.bounceSound.components.sound.pauseSound();
          }

          this.bgMusic = this.el.sceneEl.querySelector('#bg-music');
          this.matchMusic = this.el.sceneEl.querySelector('#match-music');
          this.bgMusicVolume = 0.3;
          this.matchMusicVolume = 0.3;
          
          // Listen for game start / end
          this.el.sceneEl.addEventListener('gameStarted', () => {
            this.initializeSounds();
            this.crossfadeToMatch();
          });
          this.el.sceneEl.addEventListener('matchEnded', () => {
            this.crossfadeToBackground();
          });
        },

        _setVolume: function(el, vol) {
          var sc = el && el.components && el.components.sound;
          if (!sc || !sc.pool || !sc.pool.children) return;
          for (var i = 0; i < sc.pool.children.length; i++) {
            sc.pool.children[i].setVolume(vol);
          }
        },

        _fadeSound: function(el, fromVol, toVol, durationMs, onDone) {
          var id = el.id;
          if (this._fadeTickers[id]) clearInterval(this._fadeTickers[id]);
          var self = this;
          var steps = 30;
          var stepMs = durationMs / steps;
          var current = fromVol;
          var delta = (toVol - fromVol) / steps;
          var count = 0;
          this._fadeTickers[id] = setInterval(function() {
            count++;
            current += delta;
            if (count >= steps) {
              current = toVol;
              clearInterval(self._fadeTickers[id]);
              delete self._fadeTickers[id];
              if (onDone) onDone();
            }
            self._setVolume(el, Math.max(0, current));
          }, stepMs);
        },

        crossfadeToMatch: function() {
          if (window._musicEnabled === false) return;
          if (this.matchMusic && this.matchMusic.components.sound) {
            var sc = this.matchMusic.components.sound;
            var isPlaying = false;
            if (sc.pool && sc.pool.children) {
              for (var i = 0; i < sc.pool.children.length; i++) {
                if (sc.pool.children[i].isPlaying) { isPlaying = true; break; }
              }
            }
            if (!isPlaying) {
              this._setVolume(this.matchMusic, 0);
              sc.playSound();
            }
            this._fadeSound(this.matchMusic, 0, this.matchMusicVolume, 2000);
          }
          if (this.bgMusic) {
            this._fadeSound(this.bgMusic, this.bgMusicVolume, 0, 2000);
          }
        },

        crossfadeToBackground: function() {
          if (window._musicEnabled === false) return;
          if (this.bgMusic) {
            this._fadeSound(this.bgMusic, 0, this.bgMusicVolume, 2000);
          }
          if (this.matchMusic) {
            var self = this;
            this._fadeSound(this.matchMusic, this.matchMusicVolume, 0, 2000, function() {
              if (self.matchMusic.components.sound) {
                self.matchMusic.components.sound.stopSound();
              }
            });
          }
        },
        
        initializeSounds: function() {
          if (this.soundsInitialized) return;
          
          // Resume AudioContext
          const audioContext = this.el.sceneEl.audioContext;
          if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
          }
          
          // Start all ball hum sounds (skip if already started by first grab)
          this.ballSounds.forEach(sound => {
            if (sound.id && (sound.id === 'red-ball-hum' || sound.id === 'blue-ball-hum')) {
              var isPlaying = false;
              var sc = sound.components.sound;
              if (sc && sc.pool && sc.pool.children) {
                for (var i = 0; i < sc.pool.children.length; i++) {
                  if (sc.pool.children[i].isPlaying) { isPlaying = true; break; }
                }
              }
              if (!isPlaying) sc.playSound();
            }
          });
          
          // Initialize bounce sound
          if (this.bounceSound) {
            this.bounceSound.components.sound.playSound();
            this.bounceSound.components.sound.pauseSound();
          }

          // Start background music if not already playing
          if (!window._bgMusicStarted && window._musicEnabled !== false) {
            if (this.bgMusic && this.bgMusic.components.sound) {
              this.bgMusic.components.sound.playSound();
              window._bgMusicStarted = true;
            }
          }
          
          this.soundsInitialized = true;
        }
      });

      // Game manager component
      AFRAME.registerComponent('game-manager', {
        schema: {
          playerScore: { type: 'number', default: 0 },
          botScore: { type: 'number', default: 0 },
          gameStarted: { type: 'boolean', default: false }
        },
        init: function() {
          this.playerScore = 0;
          this.botScore = 0;
          this.gameStarted = false;
          
          // Match states: WAITING, COUNTDOWN, PLAYING, OVERTIME, ENDED
          this.matchState = 'WAITING';
          this.matchDuration = 180; // 3 minutes in seconds
          this.matchStartTime = 0;
          this.countdownTime = 3;
          this.countdownStartTime = 0;
          
          // Get references to the displays
          this.scoreDisplay = this.el.querySelector('#score-display');
          this.startMessage = this.el.querySelector('#start-message');
          this.timerDisplay = this.el.querySelector('#timer-display');
          
          // Hide score and timer displays initially
          this.scoreDisplay.setAttribute('visible', false);
          this.timerDisplay.setAttribute('visible', false);
          
        },

        tick: function() {
          const currentTime = Date.now();
          
          if (this.matchState === 'COUNTDOWN') {
            const elapsed = (currentTime - this.countdownStartTime) / 1000;
            const remaining = Math.ceil(this.countdownTime - elapsed);
            
            if (remaining > 0) {

          // Cache the THREE.js material reference (retry each call until found)
          if (!this._mat) {
            const mesh = this.impactSphere.getObject3D('mesh');
            if (mesh) {
              this._mat = mesh.material;

        tick: function(time) {
          if (!this._animating) return;
          
          // Late-bind material if not cached yet
          if (!this._mat) {
            const mesh = this.impactSphere.getObject3D('mesh');
            if (mesh) this._mat = mesh.material;
          }
          
          const elapsed = time - this._animStart;
          const duration = 1000;
          const t = Math.min(elapsed / duration, 1);
          // easeOutQuad
          const eased = t * (2 - t);
          
          const startRadius = 0.05;
          const endRadius = 1.5;
          const currentRadius = startRadius + (endRadius - startRadius) * eased;
          const currentOpacity = 0.5 * (1 - eased);
          
          const s = currentRadius / startRadius;
          this.impactSphere.object3D.scale.set(s, s, s);
          if (this._mat) {
            this._mat.opacity = currentOpacity;

          if (t >= 1) {

            this._animating = false;
            this.impactSphere.object3D.visible = false;
            if (this._mat) {

            const toneMix = 0.15 + intensity * 0.2;

            for (let i = 0; i < bufSize; i++) {
              const t = i / ctx.sampleRate;
              const env = Math.exp(-t * decayRate);
              const noise = (Math.random() * 2 - 1) * (1 - toneMix);
              const tone = Math.sin(t * toneFreq * 6.2832) * toneMix;
              d[i] = (noise + tone) * env * 0.12 * (0.3 + intensity * 0.7);
              if (Math.random() < 0.015) d[i] *= 1.8;
            }
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.playbackRate.value = pitchRand;
            const bp = ctx.createBiquadFilter();
            bp.type = intensity > 0.6 ? 'bandpass' : 'highpass';
            bp.frequency.value = 2000 + Math.random() * 1500 + intensity * 4000;
            bp.Q.value = 0.5 + Math.random() * 1.5;
            const panner = ctx.createPanner();
            panner.panningModel = 'HRTF';
            panner.distanceModel = 'inverse';
            panner.refDistance = 1;
            panner.maxDistance = 15;
            panner.rolloffFactor = 3;
            if (worldPos) {
              panner.positionX.setValueAtTime(worldPos.x, now);
              panner.positionY.setValueAtTime(worldPos.y, now);
              panner.positionZ.setValueAtTime(worldPos.z, now);
            }
            const gain = ctx.createGain();
            gain.gain.value = 0.03 + intensity * 0.05;
            src.connect(bp);
            bp.connect(panner);
            panner.connect(gain);
            gain.connect(ctx.destination);
            src.start(now);
          } catch(e) {}
        },

        _triggerImpact: function(ballEl) {
          const now = performance.now();
          const cd = this._ballCooldowns.get(ballEl) || 0;
          if (now - cd < 300) return;
          this._ballCooldowns.set(ballEl, now);

          ballEl.object3D.getWorldPosition(this._tmpVec);
          const bp = this._tmpVec;
          const pos = this._wallPos;

          const grab = ballEl.components['simple-grab'];
          const vel = grab && grab.body ? grab.body.velocity : null;
          const speed = vel ? Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z) : 5;
          const normSpeed = Math.min(speed / 12.0, 1.0);

          const player = grab && grab.data ? grab.data.player : '';
          const hue = (player === 'player1') ? 0.0 : 1.0;

          let u, v;
          if (this._thinAxis === 'y') {
            u = bp.x - pos.x + this._planeW * 0.5;
            v = pos.z - bp.z + this._planeH * 0.5;
          } else if (this._thinAxis === 'x') {
            u = pos.z - bp.z + this._planeW * 0.5;
            v = bp.y - pos.y + this._planeH * 0.5;
          } else {
            u = bp.x - pos.x + this._planeW * 0.5;
            v = bp.y - pos.y + this._planeH * 0.5;
          }

          const MAX = this.data.maxImpacts;
          const idx = this._impactCount % MAX;
          this._impactPosArr[idx].set(u, v);
          const nowSec = now / 1000.0;
          this._impactTimes[idx] = nowSec;
          this._impactSpeeds[idx] = normSpeed;
          this._impactHues[idx] = hue;
          this._impactCount++;
          this._uniforms.uImpactCount.value = Math.min(this._impactCount, MAX);

          this._spawnSparks(bp, normSpeed, hue);

          this._playZap(normSpeed, bp);
        },

        _spawnSparks: function(worldPos, normSpeed, hue) {
          const scene = this.el.sceneEl.object3D;
          const count = 4 + Math.floor(Math.random() * 4);
          const warmColors = [0xFFFF44, 0xFF8800, 0xFF4400, 0xFF6600];
          const coolColors = [0x44DDFF, 0x2288FF, 0x4466FF, 0x66BBFF];
          const colors = hue < 0.5 ? warmColors : coolColors;

          for (let i = 0; i < count; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI * 0.4;
            const speed = (0.8 + Math.random() * 1.2) * (0.5 + normSpeed);

            const wallNorm = new THREE.Vector3();
            if (this._thinAxis === 'y') wallNorm.set(0, worldPos.y > 1 ? -1 : 1, 0);
            else if (this._thinAxis === 'x') wallNorm.set(worldPos.x > 0 ? -1 : 1, 0, 0);
            else wallNorm.set(0, 0, worldPos.z > 0 ? -1 : 1);

            const tangent1 = new THREE.Vector3();
            const tangent2 = new THREE.Vector3();
            if (Math.abs(wallNorm.y) > 0.9) {
              tangent1.set(1, 0, 0);
              tangent2.set(0, 0, 1);
            } else if (Math.abs(wallNorm.x) > 0.9) {
              tangent1.set(0, 1, 0);
              tangent2.set(0, 0, 1);
            } else {
              tangent1.set(1, 0, 0);
              tangent2.set(0, 1, 0);
            }

            const velocity = new THREE.Vector3()
              .addScaledVector(wallNorm, Math.cos(phi) * speed)
              .addScaledVector(tangent1, Math.sin(phi) * Math.cos(theta) * speed)
              .addScaledVector(tangent2, Math.sin(phi) * Math.sin(theta) * speed);

            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = 0.006 + Math.random() * 0.005;
            const material = new THREE.MeshBasicMaterial({
              color: new THREE.Color(color),
              transparent: true,
              opacity: 0.9
            });
            const mesh = new THREE.Mesh(this._sparkGeom, material);
            mesh.position.copy(worldPos);
            mesh.scale.setScalar(size / 0.008);
            scene.add(mesh);

            this._sparks.push({
              mesh: mesh,
              velocity: velocity,
              age: 0,
              maxAge: 0.3 + Math.random() * 0.2,
              startColor: new THREE.Color(color),
              endColor: new THREE.Color(hue < 0.5 ? 0x220000 : 0x000022),
              originalOpacity: 0.9
            });
          }
        },

        _onCollision: function(evt) {
          const collider = evt.detail.withEl;
          if (!collider || !collider.hasAttribute('simple-grab')) return;
          this._triggerImpact(collider);
        },

        tick: function(time, timeDelta) {
          this._uniforms.uTime.value = performance.now() / 1000.0;

          const dt = Math.min((timeDelta || 16) / 1000, 0.05);
          for (let i = this._sparks.length - 1; i >= 0; i--) {
            const s = this._sparks[i];
            s.age += dt;
            if (s.age >= s.maxAge) {
              s.mesh.parent.remove(s.mesh);
              s.mesh.material.dispose();
              this._sparks.splice(i, 1);
              continue;
            }
            s.mesh.position.x += s.velocity.x * dt;
            s.mesh.position.y += s.velocity.y * dt;
            s.mesh.position.z += s.velocity.z * dt;
            s.velocity.y -= 2.0 * dt;
            const progress = s.age / s.maxAge;
            s.mesh.material.color.copy(s.startColor).lerp(s.endColor, progress);
            s.mesh.material.opacity = s.originalOpacity * (1 - progress * progress);
          }

          if (!this._balls) {
            const b1 = document.querySelector('[simple-grab="player: player1"]');
            const b2 = document.querySelector('[simple-grab="player: player2"]');
            this._balls = [b1, b2].filter(Boolean);
          }

          const pos = this._wallPos;
          const threshold = 0.25;

          for (let bi = 0; bi < this._balls.length; bi++) {
            const ball = this._balls[bi];
            if (!ball || !ball.object3D) continue;
            const bp = ball.object3D.position;

            let dist;
            if (this._thinAxis === 'y') dist = Math.abs(bp.y - pos.y);
            else if (this._thinAxis === 'x') dist = Math.abs(bp.x - pos.x);
            else dist = Math.abs(bp.z - pos.z);

            const prevDist = this._ballPrevDist.get(ball);
            if (prevDist !== undefined && dist > prevDist && prevDist < threshold) {
              this._triggerImpact(ball);
            }
            this._ballPrevDist.set(ball, dist);
          }
        },

        remove: function() {
          if (this._mesh) this.el.object3D.remove(this._mesh);
          this._sparks.forEach(s => {
            if (s.mesh.parent) s.mesh.parent.remove(s.mesh);
            s.mesh.material.dispose();
          });
          this._sparks = [];
          this.el.removeEventListener('obbcollisionstarted', this._onCollision);

      // Static physics component for non-grabbable objects
      AFRAME.registerComponent('static-physics', {

          // For rackets, don't create physics bodies - handle collision manually
          if (isRacket) {

            this.lastHitTime = 0; // Track last hit to prevent multiple rapid hits
            this.lastRacketPos = null; // Initialize as null to detect first frame
            this.lastRacketQuat = new THREE.Quaternion();
            this.lastRacketTime = 0;
            this.racketVelocity = new THREE.Vector3();
            this.racketAngularVelocity = new THREE.Vector3();
            // Reusable temp objects for angular velocity computation
            this._deltaQuat = new THREE.Quaternion();
            this._angAxis = new THREE.Vector3();
            
            this.tick = function() {
              const worldPos = new THREE.Vector3();
              const worldQuat = new THREE.Quaternion();
              this.el.object3D.getWorldPosition(worldPos);
              this.el.object3D.getWorldQuaternion(worldQuat);
              
              // Initialize position tracking on first frame
              if (!this.lastRacketPos) {
                this.lastRacketPos = worldPos.clone();
                this.lastRacketQuat.copy(worldQuat);
                this.lastRacketTime = performance.now();
                console.log('Initialized racket tracking for', this.el.id);
                return;
              }
              
              const currentTime = performance.now();
              const dt = Math.max((currentTime - this.lastRacketTime) / 1000, 0.001);
              
              // Compute linear velocity
              this.racketVelocity.subVectors(worldPos, this.lastRacketPos).divideScalar(dt);
              
              // Compute angular velocity from quaternion difference
              // deltaQ = currentQ * inverse(lastQ) → rotation that happened this frame
              this._deltaQuat.copy(this.lastRacketQuat).invert();
              this._deltaQuat.premultiply(worldQuat);
              // Convert quaternion to axis-angle
              const halfAngle = Math.acos(Math.min(1, Math.abs(this._deltaQuat.w)));
              const sinHalf = Math.sin(halfAngle);
              if (sinHalf > 0.0001) {
                this._angAxis.set(
                  this._deltaQuat.x / sinHalf,
                  this._deltaQuat.y / sinHalf,
                  this._deltaQuat.z / sinHalf
                );
                const angle = 2 * halfAngle / dt; // rad/s
                this.racketAngularVelocity.copy(this._angAxis).multiplyScalar(angle);
              } else {
                this.racketAngularVelocity.set(0, 0, 0);
              }
              
              // Store current quat for orientation interpolation in checkSweptCollision
              this._currentWorldQuat = worldQuat;
              
              // Check for ball collision along movement path
              const movement = worldPos.distanceTo(this.lastRacketPos);
              if (movement > 0.00001) {
                this.checkSweptCollision(this.lastRacketPos, worldPos);
              } else {
                // Even without movement, check for stationary overlap
                this.checkSweptCollision(worldPos, worldPos);
              }
              
              // Update tracking
              this.lastRacketPos.copy(worldPos);
              this.lastRacketQuat.copy(worldQuat);
              this.lastRacketTime = currentTime;
            };
          } else {
                      // For non-racket objects, create normal physics bodies
          if (geometry && geometry.primitive === 'box') {
            const width = geometry.width || 1;
            const height = geometry.height || 1;
            const depth = geometry.depth || 1;
            shape = new CANNON.Box(new CANNON.Vec3(width/2, height/2, depth/2));
          } else if (geometry && geometry.primitive === 'sphere') {
            shape = new CANNON.Sphere(geometry.radius || 0.2);
          } else if (geometry && geometry.primitive === 'cylinder') {
            const radius = geometry.radius || 0.5;
            const height = geometry.height || 1;
            shape = new CANNON.Cylinder(radius, radius, height, 16);
            
            // Rotate to match A-Frame's orientation
            const quat = new CANNON.Quaternion();
            quat.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            shape.transformAllPoints(new CANNON.Vec3(), quat);
          } else {
            // Default to sphere shape for bot
            shape = new CANNON.Sphere(0.2);
          }
          
                    // Check if this is a back wall (z = 8 or z = -8)
          const wallPosition = this.el.getAttribute('position');
          let isBackWall = wallPosition && (Math.abs(wallPosition.z - 8) < 0.01 || Math.abs(wallPosition.z + 8) < 0.01);
          
          // Back walls (z=8 and z=-8) ALWAYS use backWallMaterial (restitution 0)
          // regardless of game mode - balls should never physically bounce off back walls
          
          const body = new CANNON.Body({
            mass: 0,
            shape: shape,
            material: isBackWall ? backWallMaterial : defaultMaterial,
            type: CANNON.Body.STATIC,
            collisionFilterGroup: 1,
            collisionFilterMask: 1
          });
          
          const position = this.el.getAttribute('position');
            const rotation = this.el.getAttribute('rotation');
            body.position.set(position.x, position.y, position.z);
            
            if (rotation) {
              const rad = Math.PI / 180;
              body.quaternion.setFromEuler(
                rotation.x * rad,
                rotation.y * rad,
                rotation.z * rad
              );

            body.el = this.el;
            body.isRacket = false;

            this.el.addEventListener('obbcollisionstarted', (evt) => {
              const collider = evt.detail.withEl;
              if (collider && collider.hasAttribute('simple-grab')) {
                const ballPos = collider.object3D.position;
                const grab = collider.components['simple-grab'];
                const bv = grab && grab.body ? grab.body.velocity : null;
                const spd = bv ? Math.sqrt(bv.x*bv.x + bv.y*bv.y + bv.z*bv.z) : 5;
                window.playBounceSound(ballPos, spd);

            world.addBody(body);
            this.body = body;

        },
        
        // Pre-allocated reusable vectors for swept collision (avoid per-frame GC on Quest)
        _sweptRp: new THREE.Vector3(),
        _sweptBp: new THREE.Vector3(),
        _sweptLocal: new THREE.Vector3(),
        _sweptBallPos: new THREE.Vector3(),
        _sweptLastBall: new THREE.Vector3(),
        _sweptContactVel: new THREE.Vector3(),
        _sweptRacketQuat: new THREE.Quaternion(),
        _sweptInvQuat: new THREE.Quaternion(),
        _sweptStepQuat: new THREE.Quaternion(),
        _sweptStepInvQuat: new THREE.Quaternion(),
        _cachedBalls: null,
        _cachedBallsTime: 0,
        
        // Swept collision detection - checks BOTH balls against the racket box
        checkSweptCollision: function(startPos, endPos) {
          // Only check collision if THIS SPECIFIC racket is active
          const isLeftRacket = this.el.id === 'leftHandRacket';
          const isRightRacket = this.el.id === 'rightHandRacket';
          
          if (isLeftRacket && !racketMode.player2.left) return;
          if (isRightRacket && !racketMode.player2.right) return;
          if (!isLeftRacket && !isRightRacket) return;
          
          // Cache ball element lookup - racket only interacts with owner's ball (player2)
          const now = Date.now();
          if (!this._cachedBalls || now - this._cachedBallsTime > 2000) {
            this._cachedBalls = [
              document.querySelector('[simple-grab="player: player2"]')
            ];
            this._cachedBallsTime = now;
          }
          
          // Cooldown to prevent multiple rapid hits (100ms = ~7 frames at 72fps)
          if (now - this.lastHitTime < 100) return;
          
          // Use the pre-computed racket velocity from the tick function
          this._sweptContactVel.copy(this.racketVelocity);
          
          // Get racket start/end orientations for interpolation during swept test
          this._sweptRacketQuat.copy(this._currentWorldQuat || this.lastRacketQuat);
          
          const halfW = 0.1, halfH = 0.1, halfD = 0.025;
          
          for (const ballEl of this._cachedBalls) {
            if (!ballEl) continue;
            const grab = ballEl.components?.['simple-grab'];
            if (!grab?.body) continue;
            if (grab._respawnPhase) continue;
            if (grab.isGrabbed) continue;
            
            const ballBody = grab.body;
            const ballRadius = ballBody.shapes[0] ? ballBody.shapes[0].radius : 0.1;
            const ballRadiusSq = ballRadius * ballRadius;
            // Use post-step position as current
            this._sweptBallPos.set(ballBody.position.x, ballBody.position.y, ballBody.position.z);
            
            // Use pre-step position as the ball's "start of frame" position
            // This captures where the ball was BEFORE physics moved it, preventing tunneling
            const playerKey = grab.data?.player || 'player2';
            const preStepPos = preStepBallPositions[playerKey];
            
            const trackKey = '_lastBallPos_' + playerKey;
            if (preStepPos) {
              this._sweptLastBall.copy(preStepPos);
            } else if (this[trackKey]) {
              this._sweptLastBall.copy(this[trackKey]);
            } else {
              this._sweptLastBall.copy(this._sweptBallPos);
            }
            
            // Swept box-sphere test: interpolate both paths, check box-sphere at each step
            const moveDist = startPos.distanceTo(endPos);
            const ballDist = this._sweptLastBall.distanceTo(this._sweptBallPos);
            const totalDist = moveDist + ballDist;
            let hitDetected = false;
            
            if (totalDist > 0.001) {
              const numSteps = Math.min(Math.max(Math.ceil(totalDist / 0.04), 5), 120);
              
              for (let i = 0; i <= numSteps; i++) {
                const t = i / numSteps;
                this._sweptRp.lerpVectors(startPos, endPos, t);
                this._sweptBp.lerpVectors(this._sweptLastBall, this._sweptBallPos, t);
                
                // Interpolate racket orientation for this step
                this._sweptStepQuat.slerpQuaternions(this.lastRacketQuat, this._sweptRacketQuat, t);
                this._sweptStepInvQuat.copy(this._sweptStepQuat).invert();
                
                // Transform ball position into racket-local space
                this._sweptLocal.copy(this._sweptBp).sub(this._sweptRp).applyQuaternion(this._sweptStepInvQuat);
                
                // Closest point on the box to the ball center (clamped)
                const lx = this._sweptLocal.x, ly = this._sweptLocal.y, lz = this._sweptLocal.z;
                const cx = Math.max(-halfW, Math.min(halfW, lx));
                const cy = Math.max(-halfH, Math.min(halfH, ly));
                const cz = Math.max(-halfD, Math.min(halfD, lz));
                
                const dx = lx - cx, dy = ly - cy, dz = lz - cz;
                
                if (dx*dx + dy*dy + dz*dz <= ballRadiusSq) {
                  hitDetected = true;
                  break;
                }
              }
            } else {
              // Both nearly stationary - direct box-sphere check using end orientation
              this._sweptInvQuat.copy(this._sweptRacketQuat).invert();
              this._sweptLocal.copy(this._sweptBallPos).sub(endPos).applyQuaternion(this._sweptInvQuat);
              const lx = this._sweptLocal.x, ly = this._sweptLocal.y, lz = this._sweptLocal.z;
              const cx = Math.max(-halfW, Math.min(halfW, lx));
              const cy = Math.max(-halfH, Math.min(halfH, ly));
              const cz = Math.max(-halfD, Math.min(halfD, lz));
              const dx = lx - cx, dy = ly - cy, dz = lz - cz;
              if (dx*dx + dy*dy + dz*dz <= ballRadiusSq) {
                hitDetected = true;
              }
            }
            
            // Store ball position for next frame's swept test (fallback)
            if (!this[trackKey]) this[trackKey] = new THREE.Vector3();
            this[trackKey].copy(this._sweptBallPos);
            
            if (hitDetected) {
              this.lastHitTime = now;
              this.applySweptImpact(ballEl, this._sweptContactVel, this._sweptBallPos);
              return; // Only hit one ball per frame
            }
          }
        },
        
        // Physics-accurate paddle-ball collision based on PingPang's model:
        // Work in paddle rest frame, decompose into normal/tangential,
        // apply restitution + friction, transfer spin, transform back.
        applySweptImpact: function(ballEl, racketLinearVelocity, contactPoint) {
          const ballBody = ballEl.components['simple-grab'].body;
          if (!ballBody) return;
          
          // --- Compute collision normal from box geometry ---
          const racketWorldPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(racketWorldPos);
          const racketQuat = new THREE.Quaternion();
          this.el.object3D.getWorldQuaternion(racketQuat);
          const racketInvQuat = racketQuat.clone().invert();
          
          const ballPos = new THREE.Vector3(ballBody.position.x, ballBody.position.y, ballBody.position.z);
          
          // Ball in racket-local space for box normal calculation
          const localBall = ballPos.clone().sub(racketWorldPos).applyQuaternion(racketInvQuat);
          const halfW = 0.1, halfH = 0.1, halfD = 0.025;
          const cx = Math.max(-halfW, Math.min(halfW, localBall.x));
          const cy = Math.max(-halfH, Math.min(halfH, localBall.y));
          const cz = Math.max(-halfD, Math.min(halfD, localBall.z));
          
          let localNormal = new THREE.Vector3(localBall.x - cx, localBall.y - cy, localBall.z - cz);
          if (localNormal.lengthSq() < 0.0001) {
            localNormal.set(0, 0, localBall.z >= 0 ? 1 : -1);
          } else {
            localNormal.normalize();
          }
          const normal = localNormal.applyQuaternion(racketQuat);
          
          // --- Paddle velocity at contact point (linear + rotational) ---
          const paddleVel = racketLinearVelocity.clone();
          // Add rotational contribution: v_rot = angularVel × (contactPoint - center)
          if (this.racketAngularVelocity && this.racketAngularVelocity.lengthSq() > 0.001) {
            const offset = contactPoint.clone().sub(racketWorldPos);
            const rotContrib = new THREE.Vector3().crossVectors(this.racketAngularVelocity, offset);
            paddleVel.add(rotContrib);
          }
          
          // --- Ball state ---
          const ballVel = new THREE.Vector3(ballBody.velocity.x, ballBody.velocity.y, ballBody.velocity.z);
          const ballAngVel = new THREE.Vector3(
            ballBody.angularVelocity.x, ballBody.angularVelocity.y, ballBody.angularVelocity.z
          );
          const incomingSpeed = ballVel.length();
          const ballRadius = ballBody.shapes[0] ? ballBody.shapes[0].radius : 0.1;
          const inertiaCoeff = 0.4;
          
          // --- Transform to paddle rest frame ---
          const relVel = ballVel.clone().sub(paddleVel);
          
          // Decompose into normal and tangential components
          let vn = relVel.dot(normal);
          
          // If vn > 0 the ball appears to be moving away from the paddle face.
          // This happens when a fast ball has already passed through the racket
          // by the time we process the swept hit — the normal is computed from the
          // wrong side. Flip the normal so the impulse pushes the ball back correctly.
          if (vn > 0) {
            normal.negate();
            vn = -vn;
          }
          
          const vperp = normal.clone().multiplyScalar(vn);
          const vpar = relVel.clone().sub(vperp);
          
          // Ball surface velocity at contact point from spin
          const vrot = new THREE.Vector3().crossVectors(
            ballAngVel, normal.clone().multiplyScalar(-ballRadius)
          );
          
          // --- Restitution coefficients (rubber paddle surface) ---
          const perpRestitution = 0.80; // Energy retained in normal bounce
          const parRestitution  = 0.0;  // Rubber grip: absorbs tangential energy
          const frictionCoeff   = 0.9;  // High friction for rubber surface
          
          // Normal impulse: reverse + attenuate normal component
          const fperpFactor = 1 + Math.sqrt(perpRestitution);
          const vperpimp = vperp.clone().multiplyScalar(-fperpFactor);
          
          // Tangential impulse: accounts for sliding velocity + ball spin
          // PingPang formula: vparimp = (vpar + vrot) * (-fpar / (1 + 1/inertia))
          const fparFactor = 1 + Math.sqrt(parRestitution); // = 1 for rubber
          const vparimp = vpar.clone().add(vrot).multiplyScalar(
            -fparFactor / (1.0 + 1.0 / inertiaCoeff)
          );
          
          // Coulomb friction limit: tangential impulse ≤ friction × normal impulse
          const vperpimpMag = vperpimp.length();
          const vparimpMag = vparimp.length();
          const vparmax = frictionCoeff * vperpimpMag;
          if (vparimpMag > vparmax && vparimpMag > 0.001) {
            vparimp.multiplyScalar(vparmax / vparimpMag);
            // Ball skids on the paddle surface
          }
          
          // Apply impulses in paddle rest frame
          relVel.add(vperpimp).add(vparimp);
          
          // Update ball spin from tangential impulse
          const spinChange = new THREE.Vector3().crossVectors(normal, vparimp)
            .divideScalar(inertiaCoeff * ballRadius);
          ballAngVel.sub(spinChange);
          
          // --- Transform back to world frame ---
          const newVel = relVel.add(paddleVel);
          
          // Apply final velocity and spin, capped by the ball owner's stage
          const ballOwner = ballEl.components['simple-grab']?.data?.player || 'player2';
          const ballGrabComp = ballEl.components['simple-grab'];
          if (ballGrabComp) ballGrabComp._pendingAction = 'racket';
          ballBody.velocity.set(newVel.x, newVel.y, newVel.z);
          capBallSpeed(ballOwner, ballBody);
          ballBody.angularVelocity.set(ballAngVel.x, ballAngVel.y, ballAngVel.z);
          
          // Clear returning state since the ball was intercepted
          const grab = ballEl.components['simple-grab'];
          if (grab && grab.isReturning) {
            grab.isReturning = false;
            grab.returningGraceUntil = 0;
          }
          
          console.log('Racket hit:', incomingSpeed.toFixed(1), '→',
            ballBody.velocity.length().toFixed(1), 'm/s, paddle:', paddleVel.length().toFixed(2),
            'm/s, spin:', ballAngVel.length().toFixed(1), 'rad/s');
          
          window.playBounceSound(contactPoint, Math.abs(vn) + paddleVel.length());
          
          // Haptic feedback proportional to impact force
          const hand = this.el.parentEl;
          const impactStrength = Math.min(1.0, Math.abs(vn) / 10);
          pulseHaptic(hand, Math.max(0.3, impactStrength), 100);
        },

        // Removed handleRacketHit function - using only swept collision detection now
      });

      // Player collision component
      AFRAME.registerComponent('player-collision', {
        schema: {
          enabled: { type: 'boolean', default: false }
        },
        init: function() {
          // Create a capsule shape for the player (better than sphere for character collision)
          const radius = 0.2; // Slightly smaller radius
          const height = 1.6; // Approximate player height
          const segments = 8; // Number of segments for the capsule
          
          // Create a cylinder for the main body
          const cylinderShape = new CANNON.Cylinder(radius, radius, height, segments);
          
          // Create spheres for the top and bottom
          const sphereShape = new CANNON.Sphere(radius);
          
          // Create the physics body as KINEMATIC so it follows the player
          // but cannot be pushed by balls or other objects
          this.body = new CANNON.Body({
            mass: 0,
            material: new CANNON.Material('default'),
            fixedRotation: true,
            type: CANNON.Body.KINEMATIC,
            collisionFilterGroup: 2,
            collisionFilterMask: 0,
            position: this.el.object3D.position.clone().add(new THREE.Vector3(0, 1.0, 0))
          });
          
          // Add the shapes to the body with proper orientation
          // Rotate cylinder to match A-Frame's orientation
          const cylinderQuat = new CANNON.Quaternion();
          cylinderQuat.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
          this.body.addShape(cylinderShape, new CANNON.Vec3(0, 0, 0), cylinderQuat);
          
          // Add spheres with proper offsets
          this.body.addShape(sphereShape, new CANNON.Vec3(0, height/2, 0)); // Top sphere
          this.body.addShape(sphereShape, new CANNON.Vec3(0, -height/2, 0)); // Bottom sphere
          
          // Add contact material for better collision response
          const contactMaterial = new CANNON.ContactMaterial(
            this.body.material,
            new CANNON.Material('default'),
            {
              friction: 0.3,
              restitution: 0.2
            }
          );
          world.addContactMaterial(contactMaterial);
          
          world.addBody(this.body);
          this.initialPosition = this.el.object3D.position.clone();
          this.targetHeight = 1.0; // Target height for the player
          
          // Store reference to the entity on the body
          this.body.el = this.el;
          
          // Add collision event listener
          this.el.addEventListener('obbcollisionstarted', (evt) => {
            if (!this.data.enabled) return;
            // In multiplayer, red ball is remote-driven; thrower handles scoring
            if (isMultiplayer) return;
            const collider = evt.detail.withEl;
            if (collider && collider.getAttribute('simple-grab') && 
                collider.getAttribute('simple-grab').player === 'player1') {
              const grab = collider.components?.['simple-grab'];
              if (grab) {
                if (grab._respawnPhase) return;
                if (grab.isGrabbed) return;
                if (!grab.isReturning && grab.body && grab.body.position.z > 6.5) {
                  grab.isReturning = true;
                  grab.returningStartTime = Date.now();
                  grab.returningGraceUntil = Date.now() + 2000;
                  return;
                }
                if (grab.isReturning && Date.now() < grab.returningGraceUntil) return;
              }

              resetStage('player1');
              const playerSphere = this.el.querySelector('a-sphere');
              if (playerSphere) {
                playerSphere.setAttribute('color', '#0000ff');
                setTimeout(() => {
                  playerSphere.setAttribute('color', '#ffffff');
                }, 1000);
              }
              
              const gameManager = this.el.sceneEl.querySelector('#game-manager');
              if (gameManager && gameManager.components['game-manager']) {
                gameManager.components['game-manager'].onPlayerHit();
              }
            }
          });
        },
        
        tick: function() {
          if (!this.data.enabled) return;

          // Kinematic body: update physics position FROM the player's VR camera,
          // so the collision capsule follows the player without being pushable
          var camera = this.el.sceneEl.querySelector('[camera]');
          if (camera) {
            var camPos = new THREE.Vector3();
            camera.object3D.getWorldPosition(camPos);
            this.body.position.set(camPos.x, this.targetHeight, camPos.z);

      AFRAME.registerComponent('bot', {
        schema: {
          throwInterval: { type: 'number', default: 5000 }, // 5 seconds
          minThrowForce: { type: 'number', default: 5 },  // Halved from 10
          maxThrowForce: { type: 'number', default: 10 },  // Halved from 20
          enabled: { type: 'boolean', default: false }
        },
        init: function() {
          this.ball = null;
          this.lastThrowTime = 0;

          this.el.addEventListener('obbcollisionstarted', (evt) => {

        },
        
        onCollision: function(evt) {
          const now = Date.now();
          if (now - this.lastHitTime < this.hitCooldown) return;
          
          const collider = evt.detail.withEl;
          
          if (collider && collider.getAttribute('simple-grab') && 
              collider.getAttribute('simple-grab').player === 'player2') {
            resetStage('player2');

              botSphere.setAttribute('color', '#ff0000');
              setTimeout(() => {
                botSphere.setAttribute('color', '#ff0000');

              }, 1000);
            }
            
            // Update score (onBotHit triggers impact effect internally)
            const gameManager = this.el.sceneEl.querySelector('#game-manager');
            if (gameManager && gameManager.components['game-manager']) {
              gameManager.components['game-manager'].onBotHit();
            }
          }
        },
        
        tick: function(time) {
          if (!this.ball || !this.data.enabled) return;
          
          // Check if it's time to throw
          if (time - this.lastThrowTime > this.throwInterval && !this.isHit) {
            this.throwBall();
            this.lastThrowTime = time;
          }
        },
        
        throwBall: function() {
          if (!this.ball || !this.ball.components['simple-grab']) return;
          if (this.ball.components['simple-grab']._respawnPhase) return;
          
          // Get player position
          const player = document.querySelector('#player');
          if (!player) return;
          
          const playerPos = new THREE.Vector3();
          player.object3D.getWorldPosition(playerPos);
          
          // Calculate random throw angle
          const throwAngle = this.calculateThrowAngle(playerPos);
          
          // Calculate throw force
          const throwForce = this.data.minThrowForce + 
            Math.random() * (this.data.maxThrowForce - this.data.minThrowForce);
          
          // Reset ball position
          this.ball.components['simple-grab'].resetPosition();
          this.ball.components['simple-grab']._pendingAction = 'throw';
          this.ball.components['simple-grab'].snapshotOpponentPos();
          
          // Apply velocity, capped by stage-based max speed
          const ballBody = this.ball.components['simple-grab'].body;
          if (ballBody) {
            const maxSpd = getStageMaxSpeed(playerStages['player1'] || 1);
            const cappedForce = Math.min(throwForce, maxSpd);
            ballBody.velocity.set(
              throwAngle.x * cappedForce,
              throwAngle.y * cappedForce,
              throwAngle.z * cappedForce
            );
          }
        },
        
        calculateThrowAngle: function(playerPos) {
          // Get bot position
          const botPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(botPos);
          
          // Use the world position of the player's target sphere (blue sphere inside camera)
          let targetPos = new THREE.Vector3();
          const playerTargetSphere = document.querySelector('#player-target');
          if (playerTargetSphere) {
            playerTargetSphere.object3D.getWorldPosition(targetPos);
          } else {
            // fallback to playerPos
            targetPos.copy(playerPos);
          }
          // Calculate direct vector to player
          const directVector = new THREE.Vector3()
            .subVectors(targetPos, botPos)
            .normalize();
          
          // Randomly choose between direct throw or bounce throw
          if (Math.random() < 0.5) {
            // Direct throw
            return directVector;
          } else {
            // Bounce throw - randomly choose a wall/floor/ceiling to bounce off
            const bounceTypes = [
              { axis: 'x', value: 2 },    // Right wall
              { axis: 'x', value: -2 },   // Left wall
              { axis: 'y', value: 4 },    // Ceiling
              { axis: 'y', value: 0 },    // Floor
              { axis: 'z', value: 8 },    // Front wall
              { axis: 'z', value: -8 }    // Back wall
            ];
            
            const bounce = bounceTypes[Math.floor(Math.random() * bounceTypes.length)];
            const bouncePoint = new THREE.Vector3();
            bouncePoint[bounce.axis] = bounce.value;
            
            // Calculate vector to bounce point
            const toBounce = new THREE.Vector3()
              .subVectors(bouncePoint, botPos)
              .normalize();
            
            // Calculate vector from bounce point to player
            const fromBounce = new THREE.Vector3()
              .subVectors(targetPos, bouncePoint)
              .normalize();
            
            // Combine vectors for final throw direction
            return new THREE.Vector3()
              .addVectors(toBounce, fromBounce)
              .normalize();
          }
        }
      });

      // FPS counter component
      AFRAME.registerComponent('fps-counter', {
        init: function() {
          this.frameCount = 0;
          this.lastTime = performance.now();
          this.fps = 0;
          this.fpsHistory = [];
          this.updateInterval = 500; // Update every 500ms for smooth display
          this.lastUpdate = 0;
        },
        
        tick: function() {
          const currentTime = performance.now();
          this.frameCount++;
          
          // Update FPS every 500ms
          if (currentTime - this.lastUpdate >= this.updateInterval) {
            const deltaTime = currentTime - this.lastTime;
            const currentFPS = Math.round((this.frameCount * 1000) / deltaTime);
            
            // Keep a history of recent FPS values for smoothing
            this.fpsHistory.push(currentFPS);
            if (this.fpsHistory.length > 5) {
              this.fpsHistory.shift(); // Keep only last 5 readings
            }
            
            // Calculate average FPS for smoother display
            const avgFPS = Math.round(this.fpsHistory.reduce((a, b) => a + b, 0) / this.fpsHistory.length);
            this.fps = avgFPS;
            
            // Update the version display
            this.updateVersionDisplay();
            
            // Reset counters
            this.frameCount = 0;
            this.lastTime = currentTime;
            this.lastUpdate = currentTime;
          }
        },
        
        updateVersionDisplay: function() {
          const versionDisplay = document.getElementById('version-display');
          if (versionDisplay) {
            const currentText = versionDisplay.getAttribute('text').value;
            
            // Extract version and status parts
            const parts = currentText.split(' | ');
            const version = parts[0];
            const status = parts.length > 1 ? parts[1] : '';
            
            // Update with FPS, preserving any existing status
            if (status && !status.includes('FPS')) {
              versionDisplay.setAttribute('text', 'value', `${version} | ${this.fps} FPS | ${status}`);
            } else if (status && status.includes('FPS')) {
              // Replace existing FPS
              const statusWithoutFPS = status.replace(/\d+ FPS/, '').replace(/^\s*\|\s*/, '').replace(/\s*\|\s*$/, '');
              if (statusWithoutFPS) {
                versionDisplay.setAttribute('text', 'value', `${version} | ${this.fps} FPS | ${statusWithoutFPS}`);
              } else {
                versionDisplay.setAttribute('text', 'value', `${version} | ${this.fps} FPS`);
              }
            } else {
              versionDisplay.setAttribute('text', 'value', `${version} | ${this.fps} FPS`);
            }
          }
        }

          this.previousHeadPos = new THREE.Vector3();

          this.el.sceneEl.addEventListener('loaded', () => {

          // Load FBX model
          const loader = new THREE.FBXLoader();
          loader.load(
